<!DOCTYPE html>
<!-- ================================================================
     GESTION COLOC — Appart 48
     ================================================================
     FICHIER PRINCIPAL DE L'APPLICATION.

     CE QU'IL FAIT :
     • Affiche les missions hebdomadaires de chaque colocataire
     • Gère le système de points (validation, malus, rattrapage)
     • Affiche le podium et le graphique des scores en temps réel
     • Affiche le journal des dernières actions (Live Activity)
     • Gère le mode sombre/clair
     • Enregistre le Service Worker pour les alertes automatiques
     • Demande la permission de notifications au premier accès

     STRUCTURE DE LA PAGE :
     ┌──────────────────────────────────────────┐
     │  BANNIÈRE (demande notifs, si pas encore) │
     │  HEADER (titre + bouton thème)            │
     ├───────────────────┬──────────────────────┤
     │  MISSIONS HEBDO   │  PODIUM              │
     │  (5 cartes fixes) │  GRAPHIQUE           │
     │                   │  LIVE ACTIVITY       │
     ├───────────────────┴──────────────────────┤
     │  FOOTER                                   │
     └──────────────────────────────────────────┘
================================================================ -->

    <style>
        /* ── SCROLLBAR FINE ET DISCRÈTE ─────────────────────────── */
        ::-webkit-scrollbar       { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        /* ── TRANSITION DOUCE LORS DU CHANGEMENT DE THÈME ───────── */
        .transition-theme {
            transition: background-color 0.4s, color 0.4s, border-color 0.4s;
        }

        /* ── LAYOUT PC : hauteur fixe, aucun scroll global ───────── */
        @media (min-width: 1024px) {
            body        { overflow: hidden; height: 100vh; }

            /* La zone principale occupe tout l'espace entre header et footer */
            #main-grid  { height: calc(100vh - 108px); overflow: hidden; }

            /* Colonne gauche : les 5 cartes missions s'étalent
               sur toute la hauteur — AUCUN scroll, tout visible */
            #col-missions {
                height: 100%;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            /* Bloc blanc intérieur */
            #col-missions > div {
                height: 100%;
                display: flex;
                flex-direction: column;
                padding: 14px 18px !important;
            }

            /* Titre missions */
            #col-missions h2 {
                font-size: 1.1rem !important;
                margin-bottom: 6px !important;
            }

            /* Légende */
            #col-missions .flex.flex-wrap {
                margin-bottom: 6px !important;
            }

            /* Conteneur cartes : répartition uniforme sans scroll */
            #tasks-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: space-around;
                overflow: hidden;
                gap: 0 !important;
            }

            /* Cartes missions plus compactes */
            #tasks-container .mission-card,
            #tasks-container > div {
                padding: 8px 14px !important;
                border-radius: 16px !important;
                flex-shrink: 0;
            }

            /* Texte des cartes plus petit */
            #tasks-container p.font-bold {
                font-size: 0.8rem !important;
            }

            /* Boutons plus compacts */
            #tasks-container button {
                padding: 6px 14px !important;
                font-size: 9px !important;
                border-radius: 10px !important;
            }

            /* Colonne droite : scroll interne si le contenu dépasse */
            #col-right {
                height: 100%;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* ── LAYOUT MOBILE : scroll global normal ────────────────── */
        @media (max-width: 1023px) {
            body       { overflow-y: auto; }
            #main-grid { overflow: visible; }
            #col-right { display: flex; flex-direction: column; gap: 1.5rem; }
        }

        /* ── ANIMATIONS CARTES MISSIONS ─────────────────────────── */
        .mission-card { transition: transform 0.15s ease; }
        .mission-card:hover { transform: scale(1.01); }

        /* ── CARTE EN RETARD (rouge) ─────────────────────────────── */
        .mission-retard {
            border-color: #ef4444 !important;
            background: linear-gradient(135deg, #fff1f2, #fef2f2) !important;
        }
        .dark .mission-retard {
            background: linear-gradient(135deg, #450a0a40, #7f1d1d30) !important;
            border-color: #ef4444 !important;
        }

        /* ── CARTE BLOQUÉE (grisée, non cliquable) ───────────────── */
        .mission-bloquee {
            opacity: 0.4;
            pointer-events: none; /* empêche tout clic */
        }

        /* ── ANIMATION BANNIÈRE NOTIFICATIONS ───────────────────── */
        #notif-banner { animation: slideDown 0.4s ease; }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }

        /* ── TOAST (message flash en bas d'écran) ────────────────── */
        #toast { transition: opacity 0.3s ease, transform 0.3s ease; }
    </style>
</head>

    <!-- ============================================================
         JAVASCRIPT PRINCIPAL
    ============================================================ -->
    <script>

        /* ── CONFIGURATION SUPABASE ─────────────────────────────────
           Connexion à la base de données cloud.
           Les deux tables utilisées :
           - scores : points, last_week_validated, tache_en_retard, retard_valide
           - logs   : journal de toutes les actions (validation, malus, rattrapage)
        ──────────────────────────────────────────────────────────── */
        const SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM';
        const _supabase    = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /* ── DONNÉES STATIQUES ──────────────────────────────────────
           Liste des colocataires et des missions dans l'ordre fixe.
           La rotation est calculée via : (index + numSemaine) % 5
        ──────────────────────────────────────────────────────────── */
        const colocs  = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        const missions = [
            "🚿 Douche Gauche",
            "🚽 WC Droit",
            "🧻 WC Gauche",
            "🧹 Cuisine + Salon",
            "🚿 Douche Droite"
        ];

        /* Variable globale pour le graphique Chart.js */
        let myChart;

        /* ── TOAST ──────────────────────────────────────────────────
           Affiche un message flash en bas d'écran pendant `duration` ms
        ──────────────────────────────────────────────────────────── */
        function showToast(msg, duration = 3000) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('hidden');
            t.style.opacity = '1';
            t.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => t.classList.add('hidden'), 300);
            }, duration);
        }

        /* ── NUMÉRO DE SEMAINE ──────────────────────────────────────
           Calcule le numéro de semaine basé sur le LUNDI.
           Chaque lundi à 00h00 → nouvelle semaine → nouvelles missions.
           Dimanche 15 mars ≠ lundi 16 mars (semaines différentes).
        ──────────────────────────────────────────────────────────── */
        function getWeekNumber() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            // Trouve le lundi de la semaine courante
            const day = now.getDay();
            const monday = new Date(now);
            monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
            monday.setHours(0, 0, 0, 0);
            // Nombre de semaines depuis le 1er janvier
            const days = Math.floor((monday - startOfYear) / 86400000);
            return Math.floor(days / 7) + 1;
        }

        /* ── MISSION D'UN COLOCATAIRE POUR UNE SEMAINE DONNÉE ───────
           Utilisé pour afficher la mission en retard (semaine passée)
           ET la mission en cours (semaine actuelle).
        ──────────────────────────────────────────────────────────── */
        function getMissionForWeek(colocIndex, weekNum) {
            return missions[(colocIndex + weekNum) % missions.length];
        }

        /* ── RENDU DES CARTES MISSIONS ──────────────────────────────
           Génère le HTML des cartes pour chaque colocataire selon son état :

           CAS 1 — Retard en cours (tache_en_retard défini et retard_valide = false) :
             → Carte rouge "RATTRAPER" (priorité absolue)
             → Carte bleue "BLOQUÉE" en dessous (inaccessible tant que retard non fait)

           CAS 2 — Pas de retard :
             → Carte bleue normale avec bouton VALIDER
             → Si déjà validé cette semaine → bouton ✅ désactivé
        ──────────────────────────────────────────────────────────── */
        function renderTasks(users) {
            const week      = getWeekNumber();
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';

            colocs.forEach((nom, i) => {
                const user = users.find(u => u.name === nom);
                if (!user) return;

                const missionCourante = getMissionForWeek(i, week);
                const aUnRetard       = user.tache_en_retard && !user.retard_valide;
                const retardRattrapé  = user.tache_en_retard && user.retard_valide;

                if (aUnRetard) {
                    /* ── CARTE RETARD ──────────────────────────────── */
                    const missionRetard = getMissionForWeek(i, user.tache_en_retard);
                    container.innerHTML += `
                    <div class="mission-card mission-retard p-3 lg:p-4 rounded-3xl border-2 flex justify-between items-center">
                        <div class="leading-tight">
                            <div class="flex items-center gap-2 mb-1">
                                <p class="text-[8px] lg:text-[10px] font-black text-red-500 uppercase tracking-widest">${nom}</p>
                                <span class="bg-red-500 text-white text-[7px] font-black px-2 py-0.5 rounded-full">
                                    ⚠️ RETARD S${user.tache_en_retard}
                                </span>
                            </div>
                            <p class="font-bold text-xs lg:text-base text-red-700 dark:text-red-300">${missionRetard}</p>
                            <p class="text-[8px] text-red-400 font-bold mt-0.5">À faire en priorité</p>
                        </div>
                        <button onclick="validerRetard('${nom}', this)"
                            class="bg-red-500 text-white px-4 py-2 lg:px-6 lg:py-3 rounded-xl font-black text-[9px] lg:text-xs shadow-lg active:scale-95 transition-all">
                            RATTRAPER
                        </button>
                    </div>`;

                    /* ── CARTE SEMAINE EN COURS (BLOQUÉE) ──────────── */
                    container.innerHTML += `
                    <div class="mission-card mission-bloquee bg-slate-100 dark:bg-slate-800/30 p-3 lg:p-4 rounded-3xl border border-slate-200 dark:border-slate-700 flex justify-between items-center">
                        <div class="leading-tight">
                            <div class="flex items-center gap-2 mb-1">
                                <p class="text-[8px] lg:text-[10px] font-black text-slate-400 uppercase tracking-widest">${nom}</p>
                                <span class="bg-slate-400 text-white text-[7px] font-black px-2 py-0.5 rounded-full">🔒 BLOQUÉ</span>
                            </div>
                            <p class="font-bold text-xs lg:text-base text-slate-400">${missionCourante}</p>
                            <p class="text-[8px] text-slate-400 font-bold mt-0.5">Disponible après le rattrapage</p>
                        </div>
                        <button disabled class="bg-slate-300 dark:bg-slate-700 text-slate-400 px-4 py-2 rounded-xl font-black text-[9px] cursor-not-allowed">
                            🔒
                        </button>
                    </div>`;

                } else {
                    /* ── CARTE NORMALE ─────────────────────────────── */
                    const dejàValidé = user.last_week_validated === week;
                    container.innerHTML += `
                    <div class="mission-card bg-slate-50 dark:bg-slate-800/40 p-3 lg:p-4 rounded-3xl border border-slate-200 dark:border-slate-700 flex justify-between items-center">
                        <div class="leading-tight">
                            <p class="text-[8px] lg:text-[10px] font-black text-blue-500 uppercase tracking-widest">${nom}</p>
                            <p class="font-bold text-xs lg:text-base dark:text-white">${missionCourante}</p>
                            ${retardRattrapé
                                ? `<p class="text-[8px] text-green-500 font-bold mt-0.5">✅ Retard S${user.tache_en_retard} rattrapé !</p>`
                                : ''}
                        </div>
                        <button data-name="${nom}" onclick="addPoints('${nom}', this)"
                            class="${dejàValidé
                                ? 'bg-green-500/20 text-green-500 px-4 py-2 rounded-xl text-[9px] font-bold'
                                : 'bg-blue-600 text-white px-4 py-2 lg:px-6 lg:py-3 rounded-xl font-black text-[9px] lg:text-xs shadow-lg active:scale-95 transition-all'}"
                            ${dejàValidé ? 'disabled' : ''}>
                            ${dejàValidé ? '✅' : 'VALIDER'}
                        </button>
                    </div>`;
                }
            });
        }

        /* ── VALIDER LE RATTRAPAGE ──────────────────────────────────
           Marque retard_valide = true dans Supabase.
           Débloque la carte de la semaine en cours.
           Ajoute un log de type "rattrapage" (0 pts, juste un suivi).
        ──────────────────────────────────────────────────────────── */
        async function validerRetard(nom, btn) {
            try {
                const { data: all } = await _supabase.from('scores').select('*');
                const user = all.find(u => u.name === nom);
                if (!user || user.retard_valide) return;

                await _supabase.from('scores')
                    .update({ retard_valide: true })
                    .eq('id', user.id);

                await _supabase.from('logs').insert([{
                    name          : nom,
                    points_gagnes : 0,
                    type          : 'rattrapage'
                }]);

                showToast(`✅ ${nom} — Rattrapage validé ! Tâche de la semaine débloquée.`);
                fetchAllData();
            } catch (e) {
                console.error('[App] Erreur validerRetard :', e);
            }
        }

        /* ── RÉCUPÉRATION ET AFFICHAGE DES DONNÉES ──────────────────
           Charge depuis Supabase :
           - La table scores (triée par points décroissants)
           - La table logs (10 dernières entrées)
           Puis met à jour le podium, live activity, cartes et graphique.
        ──────────────────────────────────────────────────────────── */
        async function fetchAllData() {
            const weekNum = getWeekNumber();

            const { data: users } = await _supabase
                .from('scores').select('*').order('points', { ascending: false });

            const { data: logs } = await _supabase
                .from('logs').select('*').order('created_at', { ascending: false }).limit(10);

            if (!users) return;

            /* ── PODIUM ──────────────────────────────────────────── */
            document.getElementById('leaderboard').innerHTML = users.map((u, i) => `
                <div class="flex justify-between items-center py-2 lg:py-3">
                    <span class="text-xs lg:text-sm font-bold ${i === 0 ? 'text-blue-500' : 'opacity-80'}">
                        ${i === 0 ? '🥇' : i + 1}. ${u.name}
                        ${u.tache_en_retard && !u.retard_valide
                            ? '<span class="text-red-500 text-[8px] ml-1">⚠️ retard</span>'
                            : ''}
                    </span>
                    <span class="font-black text-sm lg:text-xl">
                        ${u.points} <small class="text-[8px] opacity-40">PTS</small>
                    </span>
                </div>`).join('');

            /* ── LIVE ACTIVITY ───────────────────────────────────── */
            /* Labels lisibles pour chaque type d'action */
            const typeLabel = {
                validation : '✅ Validation',
                malus      : '⚠️ Malus admin',
                malus_auto : '🤖 Malus auto',
                rattrapage : '🔄 Rattrapage'
            };
            document.getElementById('history-logs').innerHTML = (logs || []).map(l => `
                <div class="flex justify-between items-center border-b border-white/5 pb-2">
                    <div class="flex flex-col">
                        <span class="font-bold text-white">${l.name}</span>
                        <span class="opacity-40 text-[8px] uppercase font-black">
                            ${typeLabel[l.type] || l.type}
                        </span>
                    </div>
                    <span class="${l.points_gagnes > 0 ? 'text-green-400' : l.points_gagnes < 0 ? 'text-red-400' : 'text-slate-400'} font-black">
                        ${l.points_gagnes > 0 ? '+' : ''}${l.points_gagnes} pts
                    </span>
                </div>`).join('');

            /* ── PANEL ADMIN — LISTE MALUS ───────────────────────── */
            document.getElementById('admin-malus-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl mb-2 text-xs">
                    <div class="text-left">
                        <span class="font-bold">${u.name} (${u.points} pts)</span>
                        ${u.tache_en_retard && !u.retard_valide
                            ? `<p class="text-red-500 text-[9px]">⚠️ Retard S${u.tache_en_retard}</p>`
                            : ''}
                    </div>
                    <button onclick="applyMalus('${u.id}', '${u.name}', ${u.points})"
                        class="bg-orange-600 text-white px-4 py-1 rounded-lg">
                        -2 PTS
                    </button>
                </div>`).join('');

            /* ── CARTES MISSIONS + GRAPHIQUE ─────────────────────── */
            renderTasks(users);
            renderChart(users);
        }

        /* ── GRAPHIQUE EN BARRES ────────────────────────────────────
           Affiche les scores de tous les colocataires.
           S'adapte au thème clair/sombre automatiquement.
        ──────────────────────────────────────────────────────────── */
        function renderChart(users) {
            const ctx    = document.getElementById('scoreChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');

            if (myChart) myChart.destroy(); /* évite les doublons */

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels  : users.map(u => u.name),
                    datasets: [{
                        data           : users.map(u => u.points),
                        backgroundColor: '#3b82f6',
                        borderRadius   : 6
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid : { color: isDark ? '#1e293b' : '#f1f5f9' },
                            ticks: { color: isDark ? '#64748b' : '#94a3b8', font: { size: 9 } }
                        },
                        x: {
                            grid : { display: false },
                            ticks: { color: isDark ? '#64748b' : '#94a3b8', font: { size: 9 } }
                        }
                    }
                }
            });
        }

        /* ── VALIDER UNE MISSION (AJOUTER DES POINTS) ───────────────
           1. Vérifie que l'utilisateur n'a pas déjà validé cette semaine
           2. Vérifie qu'il n'a pas de retard en cours non résolu
           3. Calcule les points (5 pour le 1er, 4 pour le 2e, ... 1 minimum)
           4. Met à jour Supabase + ajoute un log
           5. Si le retard était rattrapé → nettoie les colonnes retard
        ──────────────────────────────────────────────────────────── */
        async function addPoints(nom, btn) {
            const weekNum = getWeekNumber();
            try {
                const { data: all } = await _supabase.from('scores').select('*');
                const user = all.find(u => u.name === nom);
                if (!user) return;

                /* Déjà validé cette semaine */
                if (user.last_week_validated === weekNum) return;

                /* Retard non résolu → bloque la validation */
                if (user.tache_en_retard && !user.retard_valide) {
                    showToast(`⛔ ${nom} doit d'abord rattraper sa tâche en retard !`);
                    return;
                }

                /* Points décroissants selon l'ordre de validation */
                const déjàValidésCetteSemaine = all.filter(u => u.last_week_validated === weekNum).length;
                const pts = Math.max(1, 5 - déjàValidésCetteSemaine);

                /* Si retard rattrapé → on nettoie les colonnes retard */
                const updateData = {
                    points              : user.points + pts,
                    last_week_validated : weekNum,
                    ...(user.retard_valide ? { tache_en_retard: null, retard_valide: false } : {})
                };

                await _supabase.from('scores').update(updateData).eq('id', user.id);
                await _supabase.from('logs').insert([{
                    name          : nom,
                    points_gagnes : pts,
                    type          : 'validation'
                }]);

                showToast(`✅ ${nom} — +${pts} point${pts > 1 ? 's' : ''} !`);
                fetchAllData();
            } catch (e) {
                console.error('[App] Erreur addPoints :', e);
            }
        }

        /* ── MALUS MANUEL (ADMIN) ───────────────────────────────────
           Retire 2 points à un colocataire (jamais en dessous de 0).
           Demande confirmation avant d'exécuter.
        ──────────────────────────────────────────────────────────── */
        async function applyMalus(id, nom, current) {
            if (!confirm(`Punir ${nom} (-2 pts) ?`)) return;
            const newPts = Math.max(0, current - 2);
            await _supabase.from('scores').update({ points: newPts }).eq('id', id);
            await _supabase.from('logs').insert([{
                name          : nom,
                points_gagnes : -2,
                type          : 'malus'
            }]);
            showToast(`⚠️ Malus appliqué à ${nom}`);
            fetchAllData();
        }

        /* ── RESET MENSUEL (ADMIN) ──────────────────────────────────
           Remet tous les scores à 0, efface les retards et vide les logs.
           Double confirmation pour éviter les fausses manœuvres.
        ──────────────────────────────────────────────────────────── */
        async function resetAllScores() {
            if (!confirm("🚨 Pakito, confirmes-tu le Reset Total du mois ?")) return;
            await _supabase.from('scores').update({
                points              : 0,
                last_week_validated : 0,
                tache_en_retard     : null,
                retard_valide       : false
            }).neq('id', 0);
            await _supabase.from('logs').delete().neq('id', 0);
            location.reload();
        }

        /* ── SERVICE WORKER & NOTIFICATIONS ────────────────────────
           Enregistre sw.js pour les alertes automatiques du dimanche.
           Démarre la boucle de vérification en arrière-plan.
        ──────────────────────────────────────────────────────────── */
        async function initServiceWorker() {
            if (!('serviceWorker' in navigator)) return;
            try {
                const reg = await navigator.serviceWorker.register('/sw.js');
                /* Démarre la boucle de vérification dans le SW */
                const sw = reg.active || reg.installing || reg.waiting;
                if (sw) sw.postMessage({ type: 'SCHEDULE_CHECKS' });
                updateNotifStatusUI();
            } catch (err) {
                console.error('[SW] Enregistrement échoué :', err);
            }
        }

        /* ── DEMANDE DE PERMISSION NOTIFICATIONS ────────────────────
           Appelée par le bouton ACTIVER de la bannière.
           Affiche la popup native du navigateur.
        ──────────────────────────────────────────────────────────── */
        async function requestNotificationPermission() {
            if (!('Notification' in window)) {
                showToast('❌ Notifications non supportées sur ce navigateur');
                return;
            }
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                dismissBanner();
                updateNotifStatusUI();
                showToast('🔔 Notifications activées ! Rappels dim. 15h, 20h, 23h30.');
                initServiceWorker();
            } else {
                showToast('❌ Notifications refusées — activez-les dans les paramètres');
            }
        }

        /* ── MISE À JOUR DE L'ICÔNE NOTIFICATIONS ───────────────────
           🔔 si accordées, 🔕 si refusées ou en attente.
        ──────────────────────────────────────────────────────────── */
        function updateNotifStatusUI() {
            const icon = document.getElementById('notif-status');
            icon.classList.remove('hidden');
            icon.textContent = Notification.permission === 'granted' ? '🔔' : '🔕';
            icon.title = Notification.permission === 'granted'
                ? 'Notifications actives — Rappels dim. 15h, 20h, 23h30 + malus 23h59'
                : 'Notifications inactives — cliquez pour activer';
        }

        function showNotifInfo() {
            if (Notification.permission === 'granted') {
                showToast('🔔 Actives — Rappels dim. 15h / 20h / 23h30 + malus auto 23h59');
            } else {
                requestNotificationPermission();
            }
        }

        /* ── BANNIÈRE NOTIFICATIONS ─────────────────────────────────
           Apparaît au 1er chargement si pas encore acceptées.
           Mémorise le rejet dans localStorage.
        ──────────────────────────────────────────────────────────── */
        function dismissBanner() {
            const b = document.getElementById('notif-banner');
            b.style.opacity   = '0';
            b.style.transform = 'translateY(-100%)';
            setTimeout(() => b.classList.add('hidden'), 300);
            localStorage.setItem('notif-banner-dismissed', '1');
        }

        function checkShowBanner() {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') return;
            if (localStorage.getItem('notif-banner-dismissed')) return;
            setTimeout(() => document.getElementById('notif-banner').classList.remove('hidden'), 1500);
        }

        /* ── TEST NOTIFICATION (BOUTON ADMIN) ───────────────────────
           Envoie immédiatement une notification pour vérifier
           que tout fonctionne, sans attendre le dimanche.
        ──────────────────────────────────────────────────────────── */
        async function sendTestNotification() {
            if (Notification.permission !== 'granted') {
                await requestNotificationPermission();
                return;
            }
            const weekNum     = getWeekNumber();
            const { data: u } = await _supabase.from('scores').select('name, last_week_validated');
            const nonValides  = (u || []).filter(x => x.last_week_validated !== weekNum).map(x => x.name);
            const reg         = await navigator.serviceWorker.getRegistration();
            if (!reg) { showToast('❌ Service Worker non disponible'); return; }

            reg.showNotification(
                nonValides.length === 0 ? '✅ Tout le monde a validé !' : '🔔 Test — Missions en attente',
                {
                    body   : nonValides.length === 0
                        ? 'Bravo l\'équipe ! 🎉'
                        : `${nonValides.join(', ')} n'ont pas encore validé.`,
                    icon   : '/icon-192.png',
                    vibrate: [200, 100, 200]
                }
            );
            showToast('🔔 Notification test envoyée !');
        }

        async function adminSendAlert() {
            await sendTestNotification();
            document.getElementById('admin-panel').classList.add('hidden');
        }

        /* ── MODE SOMBRE / CLAIR ────────────────────────────────────
           Bascule la classe "dark" sur <html>.
           Mémorise le choix dans localStorage.
        ──────────────────────────────────────────────────────────── */
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.innerText = "🌞";
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.innerText = "🌙";
            }
            /* Recrée le graphique pour adapter les couleurs */
            if (myChart) renderChart([]);
        }

        /* ── ACCÈS ADMIN PAR 5 CLICS ────────────────────────────────
           Mécanisme discret : 5 clics rapides sur le titre ouvrent
           le panel admin. Invisible pour les non-initiés.
        ──────────────────────────────────────────────────────────── */
        let adminClicks = 0;
        document.getElementById('admin-trigger').onclick = () => {
            if (++adminClicks === 5) {
                document.getElementById('admin-panel').classList.remove('hidden');
                adminClicks = 0;
            }
        };

        /* ── INITIALISATION ─────────────────────────────────────────
           Point d'entrée principal appelé au chargement de la page.
           1. Applique le thème mémorisé
           2. Affiche le numéro de semaine
           3. Lance le Service Worker (alertes automatiques)
           4. Vérifie si la bannière notifs doit apparaître
           5. Charge les données depuis Supabase
        ──────────────────────────────────────────────────────────── */
        function init() {
            /* Restaure le thème préféré */
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').innerText = "🌙";
            }

            /* Affiche le numéro de semaine dans le header */
            document.getElementById('week-info').innerText = `Semaine n°${getWeekNumber()}`;

            /* Démarre le Service Worker pour les alertes */
            initServiceWorker();

            /* Met à jour l'icône notification */
            updateNotifStatusUI();

            /* Vérifie si la bannière doit s'afficher */
            checkShowBanner();

            /* Charge toutes les données depuis Supabase */
            fetchAllData();
        }

        /* Lance l'app */
        init();
    </script>
</body>
</html>
