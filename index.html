<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Nettoyage V2 | Pakito Edition</title>
    <meta name="author" content="Honoré Mbieleu Pakito">
    <meta name="copyright" content="© 2026 Honoré Mbieleu Pakito">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dark { background-color: #0f172a; color: white; }
        .dark .bg-white { background-color: #1e293b; color: white; border-color: #334155; }
        .dark .text-slate-800 { color: #f1f5f9; }
        .dark .text-slate-700 { color: #cbd5e1; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 pb-10 font-sans transition-all" id="body">

    <header class="bg-blue-700 text-white p-6 shadow-lg mb-6 rounded-b-[2.5rem] text-center relative overflow-hidden">
        <button onclick="toggleDarkMode()" class="absolute right-6 top-6 text-xl p-2 bg-blue-600 rounded-full shadow-inner active:scale-90 transition-all">🌓</button>
        <h1 id="admin-trigger" class="text-2xl font-black italic tracking-tighter cursor-pointer select-none relative z-10">NETTOYAGE APPART 48</h1>
        <p id="week-info" class="text-blue-200 text-xs mt-1 font-bold uppercase tracking-widest italic relative z-10">Chargement...</p>
    </header>

    <main class="max-w-md mx-auto px-4 min-h-screen">
        
        <div class="bg-white p-5 rounded-3xl shadow-md mb-6 border border-slate-200">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest text-center">Évolution des scores</h3>
            <canvas id="scoreChart" height="160"></canvas>
        </div>

        <div id="weekend-alert" class="hidden mb-6 bg-orange-100 border-l-4 border-orange-500 p-4 rounded-r-xl animate-pulse">
            <p class="text-orange-700 font-bold text-sm flex items-center">⚠️ COURSE CONTRE LA MONTRE</p>
            <p class="text-orange-600 text-[10px] italic">Validez vite pour gagner 5 points !</p>
        </div>

        <div id="tasks-container" class="space-y-3"></div>

        <h2 class="font-bold text-slate-800 mt-10 mb-4 flex items-center text-sm uppercase tracking-wide">
            <span class="mr-2">🏆</span> PODIUM DES COLOCS
        </h2>
        <div id="leaderboard" class="bg-white rounded-3xl p-4 shadow-md border border-slate-200 divide-y divide-slate-100">
            </div>

        <div class="mt-8 p-5 bg-slate-200/50 dark:bg-slate-800/50 rounded-2xl">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-tighter">Activités récentes</h3>
            <div id="history-logs" class="space-y-3"></div>
        </div>

        <div id="admin-panel" class="hidden mt-10 p-6 bg-red-900/10 rounded-[2.5rem] border-2 border-dashed border-red-300">
            <h3 class="text-red-700 font-black text-xs mb-4 text-center uppercase tracking-widest">👑 PAKITO ADMIN MODE</h3>
            <div id="admin-malus-list" class="space-y-2 mb-6"></div>
            <button onclick="resetAllScores()" class="w-full bg-red-600 text-white py-4 rounded-2xl text-xs font-black uppercase shadow-xl active:scale-95 transition-all">
                🚨 Réinitialiser tout
            </button>
        </div>

        <footer class="mt-12 mb-6 text-center border-t border-slate-200 pt-6">
            <p class="text-slate-400 text-[10px] font-medium tracking-widest uppercase">© 2026 Honoré Mbieleu Pakito</p>
            <p class="text-slate-300 text-[9px] mt-1">Tous droits réservés. Design par Pakito.</p>
        </footer>
    </main>

    <script>
        const SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const colocs = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        const missions = ["🚿 Douche G.", "🚽 WC Droit", "🧻 WC Gauche", "🧹 Cuisine", "🚿 Douche D."];
        let myChart;

        function getWeekNumber() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            return Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        }

        function toggleDarkMode() {
            document.getElementById('body').classList.toggle('dark');
            localStorage.setItem('theme', document.getElementById('body').classList.contains('dark') ? 'dark' : 'light');
        }

        async function fetchAllData() {
            const weekNum = getWeekNumber();
            const { data: users, error: uErr } = await _supabase.from('scores').select('*').order('points', { ascending: false });
            const { data: logs, error: lErr } = await _supabase.from('logs').select('*').order('created_at', { descending: true }).limit(8);

            if (uErr || lErr) return;

            // 1. MISE À JOUR DU PODIUM AVEC POINTS VISIBLES
            document.getElementById('leaderboard').innerHTML = users.map((u, i) => `
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center">
                        <span class="text-sm font-bold mr-3 ${i==0 ? 'text-yellow-500' : 'text-slate-300'}">${i==0 ? '👑' : i+1}</span>
                        <span class="font-black text-lg ${i==0 ? 'text-blue-600 dark:text-blue-400' : 'text-slate-700 dark:text-slate-300'}">${u.name}</span>
                    </div>
                    <div class="flex items-baseline">
                        <span class="font-black text-2xl text-slate-800 dark:text-white">${u.points}</span>
                        <span class="ml-1 text-[10px] font-bold text-slate-400 uppercase">pts</span>
                    </div>
                </div>`).join('');

            // 2. MISE À JOUR DE L'HISTORIQUE AVEC DÉTAIL (+5, -2)
            document.getElementById('history-logs').innerHTML = logs.map(l => {
                const color = l.points_gagnes > 0 ? 'text-green-500' : 'text-red-500';
                const sign = l.points_gagnes > 0 ? '+' : '';
                return `
                <div class="flex justify-between items-center border-b border-slate-300/20 pb-2">
                    <div class="flex flex-col">
                        <span class="font-bold text-[11px] text-slate-700 dark:text-slate-200">${l.name}</span>
                        <span class="opacity-50 text-[8px] uppercase font-bold tracking-tighter">${l.type}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-sm ${color}">${sign}${l.points_gagnes} pts</span>
                        <span class="opacity-40 text-[9px]">${new Date(l.created_at).toLocaleTimeString([], {hour: '2h', minute:'2h'})}</span>
                    </div>
                </div>`;
            }).join('');

            // Boutons de validation
            users.forEach(u => {
                const btn = document.querySelector(`button[data-name="${u.name}"]`);
                if (btn && u.last_week_validated === weekNum) {
                    btn.disabled = true; btn.innerHTML = "✅ Fait";
                    btn.className = "bg-green-100 text-green-600 px-5 py-2 rounded-xl text-xs font-bold opacity-80";
                }
            });

            // Admin Malus
            document.getElementById('admin-malus-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-white dark:bg-slate-700 p-3 rounded-xl shadow-sm mb-2">
                    <span class="text-xs font-bold dark:text-white">${u.name} (${u.points} pts)</span>
                    <button onclick="applyMalus('${u.id}', '${u.name}', ${u.points})" class="bg-orange-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold">-2 PTS</button>
                </div>`).join('');

            updateChart(users);
        }

        async function addPoints(nom, btn) {
            const weekNum = getWeekNumber();
            btn.disabled = true; btn.innerHTML = "⏳";
            try {
                let { data: all } = await _supabase.from('scores').select('*');
                const user = all.find(u => u.name === nom);
                if (user.last_week_validated === weekNum) throw new Error("Déjà validé !");

                const alreadyDone = all.filter(u => u.last_week_validated === weekNum).length;
                let pts = Math.max(1, 5 - alreadyDone);

                await _supabase.from('scores').update({ points: user.points + pts, last_week_validated: weekNum }).eq('id', user.id);
                await _supabase.from('logs').insert([{ name: nom, points_gagnes: pts, type: 'validation' }]);
                
                alert(`Félicitations ${nom} ! +${pts} pts.`);
                fetchAllData();
            } catch (e) { alert(e.message); fetchAllData(); }
        }

        async function applyMalus(id, nom, currentPoints) {
            if(!confirm(`Confirmer Malus -2 pts pour ${nom} ?`)) return;
            await _supabase.from('scores').update({ points: currentPoints - 2 }).eq('id', id);
            await _supabase.from('logs').insert([{ name: nom, points_gagnes: -2, type: 'malus' }]);
            fetchAllData();
        }

        function updateChart(users) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            const isDark = document.getElementById('body').classList.contains('dark');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: users.map(u => u.name),
                    datasets: [{ 
                        data: users.map(u => u.points), 
                        backgroundColor: '#3b82f6', 
                        borderRadius: 8,
                        barThickness: 20
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { display: false }, ticks: { color: isDark ? '#94a3b8' : '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: isDark ? '#94a3b8' : '#64748b', font: { size: 9 } } }
                    }
                }
            });
        }

        async function resetAllScores() {
            if (!confirm("🚨 Reset complet du mois ?")) return;
            await _supabase.from('scores').update({ points: 0, last_week_validated: 0 }).neq('id', 0);
            await _supabase.from('logs').delete().neq('id', 0);
            location.reload();
        }

        let adminClicks = 0;
        document.getElementById('admin-trigger').onclick = () => {
            if(++adminClicks === 5) {
                document.getElementById('admin-panel').classList.toggle('hidden');
                alert("👑 Pakito Admin Mode");
                adminClicks = 0;
            }
        };

        function init() {
            if (localStorage.getItem('theme') === 'dark') document.getElementById('body').classList.add('dark');
            const week = getWeekNumber();
            const day = new Date().getDay();
            if (day === 0 || day === 6) document.getElementById('weekend-alert').classList.remove('hidden');
            
            document.getElementById('week-info').innerText = "Semaine " + week;
            document.getElementById('tasks-container').innerHTML = colocs.map((nom, i) => {
                const mission = missions[(i + week) % missions.length];
                return `
                <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-200 flex justify-between items-center">
                    <div>
                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${nom}</p>
                        <p class="font-bold text-slate-800 text-sm">${mission}</p>
                    </div>
                    <button data-name="${nom}" onclick="addPoints('${nom}', this)" class="bg-blue-600 text-white px-6 py-2 rounded-2xl text-xs font-black shadow-lg shadow-blue-200 active:scale-95 transition-all">Valider</button>
                </div>`;
            }).join('');
            fetchAllData();
        }
        init();
    </script>
</body>
</html>
