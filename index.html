<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Team Elite | Pakito Dashboard</title>
    <meta name="author" content="Honoré Mbieleu Pakito">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Scrollbar pro pour PC */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; } /* Bloque le scroll de la page entière sur PC */
            .pc-main-area { height: calc(100vh - 110px); } /* Zone sous le header et au dessus du footer */
            .scroll-area { overflow-y: auto; height: 100%; }
        }

        .transition-theme { transition: all 0.4s ease; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-theme h-full flex flex-col" id="app-body">

    <header class="fixed top-0 left-0 right-0 bg-blue-700 text-white p-4 shadow-2xl z-50 flex justify-between items-center h-[70px]">
        <div class="flex flex-col">
            <h1 id="admin-trigger" class="text-xl lg:text-3xl font-black italic tracking-tighter cursor-pointer">🚀 CLEAN TEAM ELITE</h1>
            <p id="week-info" class="text-[10px] font-bold uppercase tracking-widest opacity-80 italic">Semaine --</p>
        </div>
        <button onclick="toggleDarkMode()" class="text-2xl p-2 bg-white/10 rounded-full hover:bg-white/20 transition-all active:scale-90">🌓</button>
    </header>

    <div class="h-[70px] shrink-0"></div>

    <main class="max-w-[1700px] mx-auto w-full p-4 lg:p-6 pc-main-area grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-y-auto lg:overflow-hidden">
        
        <div class="lg:col-span-7 flex flex-col h-full space-y-4">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-800 flex flex-col h-full overflow-hidden">
                <h2 class="font-black text-blue-600 dark:text-blue-400 mb-6 flex items-center text-xl lg:text-2xl uppercase italic shrink-0">
                    <span class="mr-3">🧹</span> Missions Hebdomadaires
                </h2>
                <div id="tasks-container" class="space-y-3 lg:space-y-4 scroll-area pr-2 pb-4">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col h-full space-y-6">
            
            <div class="bg-white dark:bg-slate-900 p-6 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-800 shrink-0">
                <h3 class="font-bold text-xs uppercase tracking-widest mb-4 flex items-center opacity-60">👑 Podium Actuel</h3>
                <div id="leaderboard" class="divide-y divide-slate-100 dark:divide-slate-800 pr-2 max-h-[250px] overflow-y-auto">
                    </div>
            </div>

            <div class="scroll-area flex flex-col space-y-6 pr-2">
                <div class="bg-white dark:bg-slate-900 p-5 rounded-[2.5rem] shadow-md border border-slate-200 dark:border-slate-800 h-[220px] shrink-0">
                    <canvas id="scoreChart"></canvas>
                </div>

                <div class="bg-slate-900 text-slate-300 p-6 rounded-[2.5rem] shadow-2xl shrink-0">
                    <p class="text-[9px] font-black text-blue-400 uppercase mb-4 tracking-widest italic">Live Activity</p>
                    <div id="history-logs" class="space-y-3 text-[10px] lg:text-[11px]">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 py-2 z-50">
        <div class="max-w-[1700px] mx-auto px-6 flex justify-between items-center text-slate-400 font-bold uppercase tracking-[0.2em] text-[8px] lg:text-[10px]">
            <span>© 2026 Honoré Mbieleu Pakito</span>
            <span class="hidden lg:inline text-blue-500 italic">Designed for Clean Coloc Elite</span>
        </div>
    </footer>

    <div id="admin-panel" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md p-8 rounded-[3rem] shadow-2xl">
            <h3 class="text-red-600 font-black text-center mb-6">👑 PAKITO ADMIN MODE</h3>
            <div id="admin-malus-list" class="space-y-2 mb-8 max-h-[300px] overflow-y-auto"></div>
            <div class="flex gap-4">
                <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="flex-1 bg-slate-200 dark:bg-slate-700 py-3 rounded-xl font-bold uppercase text-[10px]">Fermer</button>
                <button onclick="resetAllScores()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold uppercase text-[10px]">Reset Global</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const colocs = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        const missions = ["🚿 Douche Gauche", "🚽 WC Droit", "🧻 WC Gauche", "🧹 Cuisine + Salon", "🚿 Douche Droite"];
        let myChart;

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            if(myChart) renderChart([]);
        }

        function getWeekNumber() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            return Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        }

        async function fetchAllData() {
            const weekNum = getWeekNumber();
            const { data: users } = await _supabase.from('scores').select('*').order('points', { ascending: false });
            const { data: logs } = await _supabase.from('logs').select('*').order('created_at', { descending: true }).limit(10);

            if (!users) return;

            // Leaderboard
            document.getElementById('leaderboard').innerHTML = users.map((u, i) => `
                <div class="flex justify-between items-center py-4">
                    <span class="text-sm font-bold ${i==0?'text-blue-500':'opacity-80'}">${i==0?'🥇':i+1}. ${u.name}</span>
                    <span class="font-black text-xl">${u.points} <small class="text-[9px] opacity-40">PTS</small></span>
                </div>`).join('');

            // Logs
            document.getElementById('history-logs').innerHTML = logs.map(l => `
                <div class="flex justify-between border-b border-white/5 pb-1 opacity-70">
                    <span>${l.name} (${l.type})</span>
                    <span class="${l.points_gagnes>0?'text-green-400':'text-red-400'} font-bold">${l.points_gagnes>0?'+':''}${l.points_gagnes}</span>
                </div>`).join('');

            // Boutons État
            users.forEach(u => {
                const btn = document.querySelector(`button[data-name="${u.name}"]`);
                if (btn && u.last_week_validated === weekNum) {
                    btn.disabled = true; btn.innerHTML = "VALIDÉ";
                    btn.className = "bg-green-500/20 text-green-500 px-4 py-2 rounded-xl text-[10px] font-bold";
                }
            });

            // Admin List
            document.getElementById('admin-malus-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-slate-100 dark:bg-slate-800 p-3 rounded-xl mb-1 text-xs">
                    <span class="font-bold">${u.name}</span>
                    <button onclick="applyMalus('${u.id}', '${u.name}', ${u.points})" class="bg-orange-600 text-white px-3 py-1 rounded-lg">-2</button>
                </div>`).join('');

            renderChart(users);
        }

        function renderChart(users) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: users.map(u => u.name),
                    datasets: [{ data: users.map(u => u.points), backgroundColor: '#3b82f6', borderRadius: 8 }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: isDark ? '#1e293b':'#e2e8f0' }, ticks: { color: isDark?'#64748b':'#94a3b8', font:{size: 9} } },
                        x: { grid: { display: false }, ticks: { color: isDark?'#64748b':'#94a3b8', font:{size: 9} } }
                    }
                }
            });
        }

        async function addPoints(nom, btn) {
            const weekNum = getWeekNumber();
            try {
                let { data: all } = await _supabase.from('scores').select('*');
                const user = all.find(u => u.name === nom);
                if (user.last_week_validated === weekNum) return;
                const pts = Math.max(1, 5 - all.filter(u => u.last_week_validated === weekNum).length);
                await _supabase.from('scores').update({ points: user.points + pts, last_week_validated: weekNum }).eq('id', user.id);
                await _supabase.from('logs').insert([{ name: nom, points_gagnes: pts, type: 'validation' }]);
                fetchAllData();
            } catch (e) { console.error(e); }
        }

        async function applyMalus(id, nom, current) {
            await _supabase.from('scores').update({ points: current - 2 }).eq('id', id);
            await _supabase.from('logs').insert([{ name: nom, points_gagnes: -2, type: 'malus' }]);
            fetchAllData();
        }

        async function resetAllScores() {
            if (!confirm("🚨 Pakito, reset global du mois ?")) return;
            await _supabase.from('scores').update({ points: 0, last_week_validated: 0 }).neq('id', 0);
            await _supabase.from('logs').delete().neq('id', 0);
            location.reload();
        }

        let adminClicks = 0;
        document.getElementById('admin-trigger').onclick = () => { if(++adminClicks === 5) { document.getElementById('admin-panel').classList.remove('hidden'); adminClicks=0; }};

        function init() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            const week = getWeekNumber();
            document.getElementById('week-info').innerText = "Semaine n°" + week;
            document.getElementById('tasks-container').innerHTML = colocs.map((nom, i) => {
                const mission = missions[(i + week) % missions.length];
                return `
                <div class="bg-slate-50 dark:bg-slate-800/40 p-5 lg:p-7 rounded-[2rem] border border-slate-200 dark:border-slate-700 flex justify-between items-center transition-all hover:shadow-lg">
                    <div class="leading-tight">
                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${nom}</p>
                        <p class="font-bold text-base lg:text-2xl dark:text-white">${mission}</p>
                    </div>
                    <button data-name="${nom}" onclick="addPoints('${nom}', this)" class="bg-blue-600 text-white px-6 py-3 lg:px-10 lg:py-5 rounded-2xl font-black text-[10px] lg:text-sm shadow-xl active:scale-95 transition-all">VALIDER</button>
                </div>`;
            }).join('');
            fetchAllData();
        }
        init();
    </script>
</body>
</html>
