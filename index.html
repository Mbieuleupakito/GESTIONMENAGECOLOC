<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Team Elite | Master Dashboard</title>
    <meta name="author" content="Honoré Mbieleu Pakito">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Optimisation pour l'affichage SANS scroll sur PC */
        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
            .main-container { height: calc(100vh - 80px); }
            .mission-card { padding: 0.75rem !important; }
            .mission-title { font-size: 1rem !important; }
        }
        .transition-theme { transition: all 0.3s ease; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-theme flex flex-col h-screen" id="app-body">

    <header class="bg-blue-700 text-white px-6 py-3 shadow-2xl z-50 flex justify-between items-center shrink-0">
        <div class="flex flex-col">
            <h1 id="admin-trigger" class="text-xl lg:text-2xl font-black italic tracking-tighter cursor-pointer">🚀 CLEAN TEAM ELITE</h1>
            <p id="week-info" class="text-[10px] font-bold uppercase tracking-widest opacity-80">Semaine --</p>
        </div>
        <button onclick="toggleDarkMode()" class="text-xl p-2 bg-white/10 rounded-full hover:bg-white/20">🌓</button>
    </header>

    <main class="max-w-[1800px] mx-auto w-full p-3 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-6 flex-grow overflow-y-auto lg:overflow-hidden main-container">
        
        <div class="lg:col-span-7 flex flex-col h-full overflow-hidden">
            <div class="bg-white dark:bg-slate-900 p-4 lg:p-5 rounded-[2rem] shadow-xl border border-slate-200 dark:border-slate-800 flex flex-col h-full">
                <h2 class="font-black text-blue-600 dark:text-blue-400 mb-3 flex items-center text-sm lg:text-lg uppercase italic">
                    <span class="mr-2">🧹</span> Missions Hebdomadaires
                </h2>
                <div id="tasks-container" class="space-y-2 overflow-y-auto lg:overflow-visible pr-1 flex-grow justify-between flex flex-col">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col h-full gap-4 overflow-hidden">
            
            <div class="bg-white dark:bg-slate-900 p-4 rounded-[2rem] shadow-xl border border-slate-200 dark:border-slate-800 shrink-0">
                <h3 class="font-bold text-[10px] uppercase tracking-widest mb-2 opacity-60">👑 Podium</h3>
                <div id="leaderboard" class="divide-y divide-slate-100 dark:divide-slate-800">
                    </div>
            </div>

            <div class="bg-white dark:bg-slate-900 p-3 rounded-[2rem] shadow-md border border-slate-200 dark:border-slate-800 flex-grow min-h-[150px]">
                <canvas id="scoreChart"></canvas>
            </div>

            <div class="bg-slate-900 text-slate-300 p-4 rounded-[2rem] shadow-2xl h-[120px] lg:h-[150px] shrink-0">
                <p class="text-[8px] font-black text-blue-400 uppercase mb-2 tracking-widest italic">Live Activity</p>
                <div id="history-logs" class="space-y-1 overflow-y-auto h-full pb-4 text-[10px]">
                    </div>
            </div>
        </div>
    </main>

    <footer class="py-2 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm text-center border-t border-slate-200 dark:border-slate-800 shrink-0">
        <p class="text-slate-400 font-bold uppercase tracking-[0.2em] text-[8px]">© 2026 Honoré Mbieleu Pakito</p>
    </footer>

    <div id="admin-panel" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md p-8 rounded-[3rem] shadow-2xl text-center border border-red-500">
            <h3 class="text-red-600 font-black mb-6 uppercase">ADMIN MODE</h3>
            <div id="admin-malus-list" class="space-y-2 mb-8 max-h-[200px] overflow-y-auto"></div>
            <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">Fermer</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const colocs = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        const missions = ["🚿 Douche Gauche", "🚽 WC Droit", "🧻 WC Gauche", "🧹 Cuisine + Salon", "🚿 Douche Droite"];
        let myChart;

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            if(myChart) renderChart([]);
        }

        function getWeekNumber() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            return Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        }

        async function fetchAllData() {
            const weekNum = getWeekNumber();
            const { data: users } = await _supabase.from('scores').select('*').order('points', { ascending: false });
            const { data: logs } = await _supabase.from('logs').select('*').order('created_at', { descending: true }).limit(6);

            if (!users) return;

            // Podium
            document.getElementById('leaderboard').innerHTML = users.slice(0, 5).map((u, i) => `
                <div class="flex justify-between items-center py-2">
                    <span class="text-xs font-bold ${i==0?'text-blue-500':'opacity-80'}">${i+1}. ${u.name}</span>
                    <span class="font-black text-sm">${u.points} <small class="text-[8px] opacity-40">PTS</small></span>
                </div>`).join('');

            // Logs
            document.getElementById('history-logs').innerHTML = logs.map(l => `
                <div class="flex justify-between border-b border-white/5 pb-1">
                    <span>${l.name}</span>
                    <span class="${l.points_gagnes>0?'text-green-400':'text-red-400'} font-bold">${l.points_gagnes>0?'+':''}${l.points_gagnes}</span>
                </div>`).join('');

            // Boutons État
            users.forEach(u => {
                const btn = document.querySelector(`button[data-name="${u.name}"]`);
                if (btn && u.last_week_validated === weekNum) {
                    btn.disabled = true; btn.innerHTML = "✅";
                    btn.className = "bg-green-500/20 text-green-500 px-3 py-1 rounded-xl text-[9px] font-bold";
                }
            });

            renderChart(users);
        }

        function renderChart(users) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: users.map(u => u.name),
                    datasets: [{ data: users.map(u => u.points), backgroundColor: '#3b82f6', borderRadius: 4 }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: isDark ? '#1e293b':'#f1f5f9' }, ticks: { color: isDark?'#64748b':'#94a3b8', font: {size: 8} } },
                        x: { grid: { display: false }, ticks: { color: isDark?'#64748b':'#94a3b8', font: {size: 8} } }
                    }
                }
            });
        }

        async function addPoints(nom, btn) {
            const weekNum = getWeekNumber();
            try {
                let { data: all } = await _supabase.from('scores').select('*');
                const user = all.find(u => u.name === nom);
                if (user.last_week_validated === weekNum) return;
                const pts = Math.max(1, 5 - all.filter(u => u.last_week_validated === weekNum).length);
                await _supabase.from('scores').update({ points: user.points + pts, last_week_validated: weekNum }).eq('id', user.id);
                await _supabase.from('logs').insert([{ name: nom, points_gagnes: pts, type: 'validation' }]);
                fetchAllData();
            } catch (e) { console.error(e); }
        }

        let adminClicks = 0;
        document.getElementById('admin-trigger').onclick = () => { if(++adminClicks === 5) { document.getElementById('admin-panel').classList.remove('hidden'); adminClicks=0; }};

        function init() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            const week = getWeekNumber();
            document.getElementById('week-info').innerText = "Semaine n°" + week;
            document.getElementById('tasks-container').innerHTML = colocs.map((nom, i) => {
                const mission = missions[(i + week) % missions.length];
                return `
                <div class="bg-slate-50 dark:bg-slate-800/40 mission-card p-3 rounded-2xl border border-slate-200 dark:border-slate-700 flex justify-between items-center">
                    <div>
                        <p class="text-[7px] font-black text-blue-500 uppercase">${nom}</p>
                        <p class="font-bold text-xs lg:text-base dark:text-white mission-title">${mission}</p>
                    </div>
                    <button data-name="${nom}" onclick="addPoints('${nom}', this)" class="bg-blue-600 text-white px-3 py-1.5 lg:px-5 lg:py-2 rounded-xl font-black text-[9px] lg:text-xs">VALIDER</button>
                </div>`;
            }).join('');
            fetchAllData();
        }
        init();
    </script>
</body>
</html>
