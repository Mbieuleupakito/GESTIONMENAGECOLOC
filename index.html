<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Team Elite | Master Dashboard</title>
    
    <meta name="author" content="Honoré Mbieleu Pakito">
    <meta name="copyright" content="© 2026 Honoré Mbieleu Pakito">

    <script src="https://cdn.tailwindcss.com"></script> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <script>
        // Configuration du Mode Sombre pour Tailwind
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        /* SCROLLBAR PERSONNALISÉE (Très fine pour le Live Activity) */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        /* COMPORTEMENT PC (Fixe et sans scroll global) */
        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
            .pc-main-height { height: calc(100vh - 110px); } /* Espace entre Header et Footer */
            .scroll-internal { overflow-y: auto; }
        }

        /* Transition douce pour le changement de thème */
        .transition-theme { transition: background-color 0.4s, color 0.4s, border-color 0.4s; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-theme flex flex-col h-screen" id="app-body">

    <header class="bg-blue-700 text-white px-6 py-4 shadow-2xl z-50 flex justify-between items-center shrink-0">
        <div class="flex flex-col">
            <h1 id="admin-trigger" class="text-xl lg:text-2xl font-black italic tracking-tighter cursor-pointer select-none">🚀 CLEAN TEAM ELITE</h1>
            <p id="week-info" class="text-[10px] font-bold uppercase tracking-widest opacity-80 italic">Chargement...</p>
        </div>
        <button onclick="toggleDarkMode()" class="text-xl p-2 bg-white/10 rounded-full hover:bg-white/20 transition-all active:scale-90">
            <span id="theme-icon">🌓</span>
        </button>
    </header>

    <main class="max-w-[1800px] mx-auto w-full p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow overflow-y-auto lg:overflow-hidden pc-main-height">
        
        <div class="lg:col-span-7 flex flex-col h-full overflow-hidden">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-800 flex flex-col h-full">
                <h2 class="font-black text-blue-600 dark:text-blue-400 mb-6 flex items-center text-lg lg:text-2xl uppercase italic shrink-0">
                    <span class="mr-3">🧹</span> Missions Hebdo
                </h2>
                <div id="tasks-container" class="space-y-3 lg:space-y-4 scroll-internal pr-2 flex-grow">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col h-full gap-6 overflow-hidden">
            
            <div class="bg-white dark:bg-slate-900 p-5 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-800 shrink-0">
                <h3 class="font-bold text-[10px] uppercase tracking-widest mb-3 opacity-60">👑 Podium Actuel</h3>
                <div id="leaderboard" class="divide-y divide-slate-100 dark:divide-slate-800">
                    </div>
            </div>

            <div class="bg-white dark:bg-slate-900 p-4 rounded-[2.5rem] shadow-md border border-slate-200 dark:border-slate-800 flex-grow min-h-[150px]">
                <canvas id="scoreChart"></canvas>
            </div>

            <div class="bg-slate-900 text-slate-300 p-5 rounded-[2.5rem] h-[160px] lg:h-[200px] shrink-0 flex flex-col shadow-2xl">
                <p class="text-[9px] font-black text-blue-400 uppercase mb-3 tracking-widest italic">Live Activity</p>
                <div id="history-logs" class="scroll-internal space-y-2 pr-2 h-full text-[10px] lg:text-[11px]">
                    </div>
            </div>
        </div>
    </main>

    <footer class="bg-white/50 dark:bg-slate-950/50 backdrop-blur-md py-3 text-center border-t border-slate-200 dark:border-slate-800 shrink-0">
        <p class="text-slate-400 font-bold uppercase tracking-[0.3em] text-[8px] lg:text-[10px]">
            © 2026 Honoré Mbieleu Pakito | Tous droits réservés
        </p>
    </footer>

    <div id="admin-panel" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md p-8 rounded-[3rem] shadow-2xl text-center border-2 border-red-500">
            <h3 class="text-red-600 font-black mb-6 uppercase italic">👑 Pakito Admin Mode</h3>
            <div id="admin-malus-list" class="space-y-2 mb-8 max-h-[250px] overflow-y-auto pr-2"></div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="bg-slate-200 dark:bg-slate-700 py-3 rounded-xl font-bold">Fermer</button>
                <button onclick="resetAllScores()" class="bg-red-600 text-white py-3 rounded-xl font-bold">RESET MOIS</button>
            </div>
        </div>
    </div>

    <script>
        /* --- CONFIGURATION SUPABASE --- */
        const SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const colocs = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        const missions = ["🚿 Douche Gauche", "🚽 WC Droit", "🧻 WC Gauche", "🧹 Cuisine + Salon", "🚿 Douche Droite"];
        let myChart;

        /* --- GESTION DU MODE SOMBRE --- */
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.innerText = "🌞";
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.innerText = "🌙";
            }
            if(myChart) renderChart([]); 
        }

        /* --- CALCUL SEMAINE --- */
        function getWeekNumber() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            return Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        }

        /* --- RÉCUPÉRATION DES DONNÉES --- */
        async function fetchAllData() {
            const weekNum = getWeekNumber();
            const { data: users } = await _supabase.from('scores').select('*').order('points', { ascending: false });
            const { data: logs } = await _supabase.from('logs').select('*').order('created_at', { descending: true }).limit(10);

            if (!users) return;

            // 1. Mise à jour Podium (Points en gros)
            document.getElementById('leaderboard').innerHTML = users.map((u, i) => `
                <div class="flex justify-between items-center py-2 lg:py-3">
                    <span class="text-xs lg:text-sm font-bold ${i==0?'text-blue-500':'opacity-80'}">${i==0?'🥇':i+1}. ${u.name}</span>
                    <span class="font-black text-sm lg:text-xl">${u.points} <small class="text-[8px] opacity-40">PTS</small></span>
                </div>`).join('');

            // 2. Mise à jour Live Activity (Avec détails +5, -2)
            document.getElementById('history-logs').innerHTML = logs.map(l => `
                <div class="flex justify-between items-center border-b border-white/5 pb-2">
                    <div class="flex flex-col">
                        <span class="font-bold text-white">${l.name}</span>
                        <span class="opacity-40 text-[8px] uppercase font-black">${l.type}</span>
                    </div>
                    <span class="${l.points_gagnes>0?'text-green-400':'text-red-400'} font-black">
                        ${l.points_gagnes>0?'+':''}${l.points_gagnes} pts
                    </span>
                </div>`).join('');

            // 3. État des boutons de validation
            users.forEach(u => {
                const btn = document.querySelector(`button[data-name="${u.name}"]`);
                if (btn && u.last_week_validated === weekNum) {
                    btn.disabled = true; btn.innerHTML = "✅";
                    btn.className = "bg-green-500/20 text-green-500 px-4 py-2 rounded-xl text-[9px] font-bold";
                }
            });

            // 4. Liste Admin pour Malus
            document.getElementById('admin-malus-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl mb-2 text-xs">
                    <span class="font-bold">${u.name} (${u.points} pts)</span>
                    <button onclick="applyMalus('${u.id}', '${u.name}', ${u.points})" class="bg-orange-600 text-white px-4 py-1 rounded-lg">-2 PTS</button>
                </div>`).join('');

            renderChart(users);
        }

        /* --- GRAPHIQUE --- */
        function renderChart(users) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: users.map(u => u.name),
                    datasets: [{ data: users.map(u => u.points), backgroundColor: '#3b82f6', borderRadius: 6 }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: isDark ? '#1e293b':'#f1f5f9' }, ticks: { color: isDark?'#64748b':'#94a3b8', font: {size: 9} } },
                        x: { grid: { display: false }, ticks: { color: isDark?'#64748b':'#94a3b8', font: {size: 9} } }
                    }
                }
            });
        }

        /* --- ACTIONS (POINTS / MALUS / RESET) --- */
        async function addPoints(nom, btn) {
            const weekNum = getWeekNumber();
            try {
                let { data: all } = await _supabase.from('scores').select('*');
                const user = all.find(u => u.name === nom);
                if (user.last_week_validated === weekNum) return;
                const pts = Math.max(1, 5 - all.filter(u => u.last_week_validated === weekNum).length);
                await _supabase.from('scores').update({ points: user.points + pts, last_week_validated: weekNum }).eq('id', user.id);
                await _supabase.from('logs').insert([{ name: nom, points_gagnes: pts, type: 'validation' }]);
                fetchAllData();
            } catch (e) { console.error(e); }
        }

        async function applyMalus(id, nom, current) {
            if(!confirm(`Punir ${nom} (-2 pts) ?`)) return;
            await _supabase.from('scores').update({ points: current - 2 }).eq('id', id);
            await _supabase.from('logs').insert([{ name: nom, points_gagnes: -2, type: 'malus' }]);
            fetchAllData();
        }

        async function resetAllScores() {
            if (!confirm("🚨 Pakito, confirmes-tu le Reset Total du mois ?")) return;
            await _supabase.from('scores').update({ points: 0, last_week_validated: 0 }).neq('id', 0);
            await _supabase.from('logs').delete().neq('id', 0);
            location.reload();
        }

        /* --- SÉCURITÉ ADMIN (5 CLICS) --- */
        let adminClicks = 0;
        document.getElementById('admin-trigger').onclick = () => { 
            if(++adminClicks === 5) { 
                document.getElementById('admin-panel').classList.remove('hidden'); 
                adminClicks = 0; 
            }
        };

        /* --- INITIALISATION --- */
        function init() {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').innerText = "🌙";
            }
            
            const week = getWeekNumber();
            document.getElementById('week-info').innerText = "Semaine n°" + week;
            document.getElementById('tasks-container').innerHTML = colocs.map((nom, i) => {
                const mission = missions[(i + week) % missions.length];
                return `
                <div class="bg-slate-50 dark:bg-slate-800/40 p-3 lg:p-5 rounded-3xl border border-slate-200 dark:border-slate-700 flex justify-between items-center transition-transform hover:scale-[1.01]">
                    <div class="leading-tight">
                        <p class="text-[8px] lg:text-[10px] font-black text-blue-500 uppercase tracking-widest">${nom}</p>
                        <p class="font-bold text-xs lg:text-lg dark:text-white">${mission}</p>
                    </div>
                    <button data-name="${nom}" onclick="addPoints('${nom}', this)" class="bg-blue-600 text-white px-4 py-2 lg:px-8 lg:py-4 rounded-xl lg:rounded-2xl font-black text-[9px] lg:text-xs shadow-lg active:scale-95 transition-all">VALIDER</button>
                </div>`;
            }).join('');
            fetchAllData();
        }

        init();
    </script>
</body>
</html>
