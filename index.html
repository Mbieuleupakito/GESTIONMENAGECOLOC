<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion nettoyage V2 | Pakito Edition</title>
    <meta name="author" content="Honoré Mbieleu Pakito">
    <meta name="copyright" content="© 2026 Honoré Mbieleu Pakito">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dark { background-color: #0f172a; color: white; }
        .dark .bg-white { background-color: #1e293b; color: white; border-color: #334155; }
        .dark .text-slate-800 { color: #f1f5f9; }
        .dark .text-slate-700 { color: #cbd5e1; }
        .transition-all { transition: all 0.3s ease; }
        /* Empêche le défilement sur PC si le contenu tient bien */
        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans transition-all flex flex-col h-screen" id="body">

    <header class="bg-blue-700 text-white p-4 shadow-lg rounded-b-[2rem] text-center relative shrink-0">
        <button onclick="toggleDarkMode()" class="absolute right-6 top-4 text-xl p-2 bg-blue-600 rounded-full shadow-inner active:scale-90 transition-all">🌓</button>
        <h1 id="admin-trigger" class="text-xl lg:text-2xl font-black italic tracking-tighter cursor-pointer select-none">NETTOYAGE APPART 48</h1>
        <p id="week-info" class="text-blue-200 text-[10px] font-bold uppercase tracking-widest italic">Chargement...</p>
    </header>

    <main class="flex-grow p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-2 gap-6 overflow-y-auto lg:overflow-hidden max-w-[1400px] mx-auto w-full">
        
        <div class="flex flex-col gap-4">
            <div class="bg-white p-4 rounded-3xl shadow-md border border-slate-200 h-1/2 flex flex-col">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-2 text-center italic">Performances du mois</h3>
                <div class="flex-grow relative">
                    <canvas id="scoreChart"></canvas>
                </div>
            </div>

            <div class="bg-white/50 dark:bg-slate-800/30 p-2 rounded-3xl flex-grow overflow-y-auto lg:overflow-y-visible">
                <h2 class="font-bold text-slate-800 dark:text-slate-200 mb-3 ml-2 text-sm uppercase tracking-wide flex items-center">
                    <span class="mr-2">🧹</span> Missions Hebdo
                </h2>
                <div id="tasks-container" class="space-y-3"></div>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="bg-white p-5 rounded-3xl shadow-md border border-slate-200 flex-grow overflow-hidden flex flex-col">
                <h2 class="font-bold text-slate-800 dark:text-slate-200 mb-4 flex items-center text-sm uppercase tracking-wide">
                    <span class="mr-2">🏆</span> Podium Live
                </h2>
                <div id="leaderboard" class="divide-y divide-slate-100 overflow-y-auto pr-2"></div>
            </div>

            <div class="bg-slate-200/50 dark:bg-slate-800/50 p-5 rounded-3xl h-[250px] flex flex-col">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-tighter">Flux d'activité récent</h3>
                <div id="history-logs" class="space-y-2 overflow-y-auto"></div>
            </div>
        </div>

        <div id="admin-panel" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
            <div class="bg-white dark:bg-slate-900 w-full max-w-md p-8 rounded-[3rem] border-2 border-red-300 shadow-2xl relative">
                <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="absolute top-6 right-6 text-slate-400">✕</button>
                <h3 class="text-red-700 font-black text-sm mb-6 text-center uppercase tracking-widest">👑 PAKITO ADMIN MODE</h3>
                <div id="admin-malus-list" class="space-y-2 mb-6 max-h-[300px] overflow-y-auto pr-2"></div>
                <button onclick="resetAllScores()" class="w-full bg-red-600 text-white py-4 rounded-2xl text-xs font-black uppercase shadow-xl active:scale-95 transition-all">🚨 Reset du mois</button>
            </div>
        </div>
    </main>

    <footer class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md py-2 text-center shrink-0">
        <p class="text-slate-400 text-[9px] font-medium tracking-widest uppercase">
            © 2026 Honoré Mbieleu Pakito | Designed for Clean Coloc
        </p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const colocs = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        const missions = ["🚿 Douche G.", "🚽 WC Droit", "🧻 WC Gauche", "🧹 Cuisine", "🚿 Douche D."];
        let myChart;

        function getWeekNumber() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            return Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        }

        function toggleDarkMode() {
            document.getElementById('body').classList.toggle('dark');
            localStorage.setItem('theme', document.getElementById('body').classList.contains('dark') ? 'dark' : 'light');
            if (myChart) updateChart([]); // Force rafraichissement couleurs chart
        }

        async function fetchAllData() {
            const weekNum = getWeekNumber();
            const { data: users } = await _supabase.from('scores').select('*').order('points', { ascending: false });
            const { data: logs } = await _supabase.from('logs').select('*').order('created_at', { descending: true }).limit(10);

            if (!users || !logs) return;

            // 1. Leaderboard
            document.getElementById('leaderboard').innerHTML = users.map((u, i) => `
                <div class="flex justify-between items-center py-3">
                    <div class="flex items-center">
                        <span class="text-xs font-bold mr-3 ${i==0 ? 'text-yellow-500' : 'text-slate-300'}">${i==0 ? '👑' : i+1}</span>
                        <span class="font-bold text-base ${i==0 ? 'text-blue-600 dark:text-blue-400' : 'text-slate-700 dark:text-slate-300'}">${u.name}</span>
                    </div>
                    <div class="text-right flex items-baseline gap-1">
                        <span class="font-black text-xl text-slate-800 dark:text-white">${u.points}</span>
                        <span class="text-[8px] font-bold text-slate-400 uppercase italic">pts</span>
                    </div>
                </div>`).join('');

            // 2. Logs
            document.getElementById('history-logs').innerHTML = logs.map(l => {
                const color = l.points_gagnes > 0 ? 'text-green-500' : 'text-red-500';
                const sign = l.points_gagnes > 0 ? '+' : '';
                return `<div class="flex justify-between items-center text-[10px] border-b border-slate-400/10 pb-1">
                    <span class="font-bold">${l.name} <span class="opacity-50 text-[8px]">(${l.type})</span></span>
                    <span class="${color} font-black">${sign}${l.points_gagnes} pts | <span class="opacity-40 font-normal">${new Date(l.created_at).toLocaleTimeString([], {hour: '2h', minute:'2h'})}</span></span>
                </div>`;
            }).join('');

            // 3. Validation boutons
            users.forEach(u => {
                const btn = document.querySelector(`button[data-name="${u.name}"]`);
                if (btn && u.last_week_validated === weekNum) {
                    btn.disabled = true; btn.innerHTML = "✅";
                    btn.className = "bg-green-100 text-green-600 px-4 py-2 rounded-2xl text-[10px] font-bold opacity-60";
                }
            });

            // 4. Admin Malus
            document.getElementById('admin-malus-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-slate-50 dark:bg-slate-800 p-3 rounded-2xl mb-2">
                    <span class="text-xs font-bold dark:text-white">${u.name}</span>
                    <button onclick="applyMalus('${u.id}', '${u.name}', ${u.points})" class="bg-orange-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold">-2 PTS</button>
                </div>`).join('');

            updateChart(users);
        }

        async function addPoints(nom, btn) {
            const weekNum = getWeekNumber();
            btn.disabled = true; btn.innerHTML = "⏳";
            try {
                let { data: all } = await _supabase.from('scores').select('*');
                const user = all.find(u => u.name === nom);
                if (user.last_week_validated === weekNum) return;

                const alreadyDone = all.filter(u => u.last_week_validated === weekNum).length;
                let pts = Math.max(1, 5 - alreadyDone);

                await _supabase.from('scores').update({ points: user.points + pts, last_week_validated: weekNum }).eq('id', user.id);
                await _supabase.from('logs').insert([{ name: nom, points_gagnes: pts, type: 'validation' }]);
                
                alert(`Bravo ${nom} ! +${pts} pts.`);
                fetchAllData();
            } catch (e) { alert(e.message); fetchAllData(); }
        }

        async function applyMalus(id, nom, currentPoints) {
            if(!confirm(`Malus -2 pts pour ${nom} ?`)) return;
            await _supabase.from('scores').update({ points: currentPoints - 2 }).eq('id', id);
            await _supabase.from('logs').insert([{ name: nom, points_gagnes: -2, type: 'malus' }]);
            fetchAllData();
        }

        function updateChart(users) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            const isDark = document.getElementById('body').classList.contains('dark');
            const chartData = users.length > 0 ? users : myChart?.data.datasets[0].data; // Sauvegarde des données si juste toggle dark
            const chartLabels = users.length > 0 ? users.map(u => u.name) : myChart?.data.labels;

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartLabels,
                    datasets: [{ 
                        data: users.length > 0 ? users.map(u => u.points) : chartData, 
                        backgroundColor: '#3b82f6', borderRadius: 8, barThickness: 20
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: isDark ? '#334155' : '#e2e8f0' }, ticks: { color: isDark ? '#94a3b8' : '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: isDark ? '#94a3b8' : '#64748b', font: { size: 9 } } }
                    }
                }
            });
        }

        async function resetAllScores() {
            if (!confirm("🚨 Reset complet du mois ?")) return;
            await _supabase.from('scores').update({ points: 0, last_week_validated: 0 }).neq('id', 0);
            await _supabase.from('logs').delete().neq('id', 0);
            location.reload();
        }

        let adminClicks = 0;
        document.getElementById('admin-trigger').onclick = () => {
            if(++adminClicks === 5) {
                document.getElementById('admin-panel').classList.toggle('hidden');
                adminClicks = 0;
            }
        };

        function init() {
            if (localStorage.getItem('theme') === 'dark') document.getElementById('body').classList.add('dark');
            const week = getWeekNumber();
            document.getElementById('week-info').innerText = "Semaine " + week;
            document.getElementById('tasks-container').innerHTML = colocs.map((nom, i) => {
                const mission = missions[(i + week) % missions.length];
                return `
                <div class="bg-white dark:bg-slate-800/80 p-3 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex justify-between items-center">
                    <div><p class="text-[8px] font-black text-blue-500 uppercase">${nom}</p><p class="font-bold text-slate-800 dark:text-white text-xs">${mission}</p></div>
                    <button data-name="${nom}" onclick="addPoints('${nom}', this)" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black active:scale-95 transition-all shadow-md">Valider</button>
                </div>`;
            }).join('');
            fetchAllData();
        }
        init();
    </script>
</body>
</html>
