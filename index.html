<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Coloc | Appart 48</title>
    <meta name="author" content="Honoré Mbieleu Pakito">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1d4ed8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GestionColoc">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:10px}
        .transition-theme{transition:background-color .4s,color .4s,border-color .4s}
        @media(min-width:1024px){
            body{overflow:hidden;height:100vh}
            #main-grid{height:calc(100vh - 108px);overflow:hidden}
            #col-missions{height:100%;overflow:hidden;display:flex;flex-direction:column}
            #col-missions>div{height:100%;display:flex;flex-direction:column;padding:14px 18px!important}
            #col-missions h2{font-size:1.1rem!important;margin-bottom:6px!important}
            #col-missions .flex.flex-wrap{margin-bottom:6px!important}
            #tasks-container{flex:1;display:flex;flex-direction:column;justify-content:space-around;overflow:hidden;gap:0!important}
            #tasks-container .mission-card,#tasks-container>div{padding:8px 14px!important;border-radius:16px!important;flex-shrink:0}
            #tasks-container p.font-bold{font-size:.8rem!important}
            #tasks-container button{padding:6px 14px!important;font-size:9px!important;border-radius:10px!important}
            #col-right{height:100%;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
        }
        @media(max-width:1023px){body{overflow-y:auto}#main-grid{overflow:visible}#col-right{display:flex;flex-direction:column;gap:1.5rem}}
        .mission-card{transition:transform .15s ease}.mission-card:hover{transform:scale(1.01)}
        .mission-retard{border-color:#ef4444!important;background:linear-gradient(135deg,#fff1f2,#fef2f2)!important}
        .dark .mission-retard{background:linear-gradient(135deg,#450a0a40,#7f1d1d30)!important;border-color:#ef4444!important}
        .mission-bloquee{opacity:.4;pointer-events:none}
        #notif-banner{animation:slideDown .4s ease}
        @keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
        #toast{transition:opacity .3s ease,transform .3s ease}
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-theme flex flex-col">

    <!-- BANNIÈRE NOTIFICATIONS -->
    <div id="notif-banner" class="hidden bg-blue-600 text-white px-4 py-3 flex items-center justify-between gap-3 shrink-0 z-40">
        <div class="flex items-center gap-3">
            <span class="text-xl">🔔</span>
            <div>
                <p class="font-bold text-sm">Activer les rappels de mission</p>
                <p class="text-xs opacity-80">Recevez une alerte le dimanche + quand un coloc valide</p>
            </div>
        </div>
        <div class="flex gap-2 shrink-0">
            <button onclick="requestNotificationPermission()" class="bg-white text-blue-600 font-black px-4 py-2 rounded-xl text-xs active:scale-95 transition-all">ACTIVER</button>
            <button onclick="dismissBanner()" class="bg-white/20 text-white font-bold px-3 py-2 rounded-xl text-xs">✕</button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="bg-blue-700 text-white px-6 py-4 shadow-2xl z-50 flex justify-between items-center shrink-0">
        <div class="flex flex-col">
            <h1 id="admin-trigger" class="text-xl lg:text-2xl font-black italic tracking-tighter cursor-pointer select-none">🏠 GESTION APPART 48</h1>
            <p id="week-info" class="text-[10px] font-bold uppercase tracking-widest opacity-80 italic">Chargement...</p>
        </div>
        <div class="flex items-center gap-3">
            <div id="notif-status" class="hidden text-lg cursor-pointer" onclick="showNotifInfo()" title="Statut notifications"></div>
            <button onclick="toggleDarkMode()" class="text-xl p-2 bg-white/10 rounded-full hover:bg-white/20 transition-all active:scale-90">
                <span id="theme-icon">🌓</span>
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main id="main-grid" class="max-w-[1800px] mx-auto w-full p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
        <div id="col-missions" class="lg:col-span-7">
            <div class="bg-white dark:bg-slate-900 p-6 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-800 h-full flex flex-col">
                <h2 class="font-black text-blue-600 dark:text-blue-400 mb-4 flex items-center text-lg lg:text-2xl uppercase italic shrink-0">
                    <span class="mr-3">🧹</span> Missions Hebdo
                </h2>
                <div class="flex flex-wrap gap-3 mb-4 shrink-0">
                    <span class="flex items-center gap-1 text-[9px] font-bold text-red-500"><span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span> RETARD</span>
                    <span class="flex items-center gap-1 text-[9px] font-bold text-slate-400"><span class="w-2 h-2 rounded-full bg-slate-300 inline-block"></span> BLOQUÉ</span>
                    <span class="flex items-center gap-1 text-[9px] font-bold text-blue-500"><span class="w-2 h-2 rounded-full bg-blue-500 inline-block"></span> SEMAINE EN COURS</span>
                </div>
                <div id="tasks-container"></div>
            </div>
        </div>

        <div id="col-right" class="lg:col-span-5">
            <div class="bg-white dark:bg-slate-900 p-5 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-800 shrink-0">
                <h3 class="font-bold text-[10px] uppercase tracking-widest mb-3 opacity-60">👑 Podium Actuel</h3>
                <div id="leaderboard" class="divide-y divide-slate-100 dark:divide-slate-800"></div>
            </div>
            <div class="bg-white dark:bg-slate-900 p-4 rounded-[2.5rem] shadow-md border border-slate-200 dark:border-slate-800 shrink-0" style="min-height:180px;">
                <canvas id="scoreChart" style="max-height:160px;"></canvas>
            </div>
            <div class="bg-slate-900 text-slate-300 p-5 rounded-[2.5rem] shrink-0 flex flex-col shadow-2xl" style="min-height:160px;max-height:220px;">
                <p class="text-[9px] font-black text-blue-400 uppercase mb-3 tracking-widest italic">Live Activity</p>
                <div id="history-logs" class="overflow-y-auto space-y-2 pr-2 flex-grow text-[10px] lg:text-[11px]"></div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white/50 dark:bg-slate-950/50 backdrop-blur-md py-3 text-center border-t border-slate-200 dark:border-slate-800 shrink-0">
        <p class="text-slate-400 font-bold uppercase tracking-[0.3em] text-[8px] lg:text-[10px]">© 2026 Honoré Mbieleu Pakito | Tous droits réservés</p>
    </footer>

    <!-- PANEL ADMIN -->
    <div id="admin-panel" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md p-6 rounded-[3rem] shadow-2xl text-center border-2 border-red-500 max-h-[90vh] overflow-y-auto">
            <h3 class="text-red-600 font-black mb-4 uppercase italic">👑 Pakito Admin Mode</h3>

            <!-- MALUS LISTE -->
            <div id="admin-malus-list" class="space-y-2 mb-4 max-h-[200px] overflow-y-auto pr-2"></div>

            <!-- SECTION TESTS ALARMES -->
            <div class="bg-slate-100 dark:bg-slate-800 rounded-2xl p-4 mb-4 text-left">
                <p class="text-[9px] font-black text-red-500 uppercase tracking-widest mb-3">🧪 Tests Alarmes</p>
                <div class="space-y-2">
                    <button onclick="testAlarme()" class="w-full bg-red-600 text-white py-2 rounded-xl font-bold text-xs">
                        🚨 Tester l'alarme dimanche
                    </button>
                    <button onclick="testValidation()" class="w-full bg-green-600 text-white py-2 rounded-xl font-bold text-xs">
                        ✅ Tester notification validation
                    </button>
                    <button onclick="testRappel()" class="w-full bg-orange-500 text-white py-2 rounded-xl font-bold text-xs">
                        🔔 Tester rappel non-validés
                    </button>
                </div>
            </div>

            <!-- BOUTONS FERMER / RESET -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="bg-slate-200 dark:bg-slate-700 py-3 rounded-xl font-bold text-sm">Fermer</button>
                <button onclick="resetAllScores()" class="bg-red-600 text-white py-3 rounded-xl font-bold text-sm">RESET MOIS</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[70] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold max-w-xs text-center"></div>

    <script>
        /* ── CONFIG ── */
        var SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM';
        var HEADERS = {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json'
        };

        /* ── FETCH SUPABASE ── */
        function dbGet(table, cols, filters, order, limit) {
            try {
                var url = SUPABASE_URL + '/rest/v1/' + table + '?select=' + (cols || '*');
                if (filters) filters.forEach(function(f){ url += '&' + f; });
                if (order) url += '&order=' + order;
                if (limit) url += '&limit=' + limit;
                return fetch(url, { headers: HEADERS })
                    .then(function(res) { return res.json(); })
                    .then(function(data) { return Array.isArray(data) ? data : []; })
                    .catch(function(e) { console.error('dbGet', e); return []; });
            } catch(e) { return Promise.resolve([]); }
        }

        function dbUpdate(table, obj, filters) {
            var url = SUPABASE_URL + '/rest/v1/' + table;
            if (filters && filters.length) url += '?' + filters.join('&');
            var h = Object.assign({}, HEADERS, { 'Prefer': 'return=minimal' });
            return fetch(url, { method: 'PATCH', headers: h, body: JSON.stringify(obj) }).catch(function(e){ console.error('dbUpdate', e); });
        }

        function dbInsert(table, obj) {
            var h = Object.assign({}, HEADERS, { 'Prefer': 'return=minimal' });
            return fetch(SUPABASE_URL + '/rest/v1/' + table, {
                method: 'POST', headers: h,
                body: JSON.stringify(Array.isArray(obj) ? obj[0] : obj)
            }).catch(function(e){ console.error('dbInsert', e); });
        }

        function dbDelete(table, filters) {
            var url = SUPABASE_URL + '/rest/v1/' + table;
            if (filters && filters.length) url += '?' + filters.join('&');
            var h = Object.assign({}, HEADERS, { 'Prefer': 'return=minimal' });
            return fetch(url, { method: 'DELETE', headers: h }).catch(function(e){ console.error('dbDelete', e); });
        }

        /* ── DONNÉES STATIQUES ── */
        var colocs  = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        var missions = ["🚿 Douche Gauche", "🚽 WC Droit", "🧻 WC Gauche", "🧹 Cuisine + Salon", "🚿 Douche Droite"];
        var myChart;
        var swReg = null; /* Référence au Service Worker */

        /* ── TOAST ── */
        function showToast(msg, duration) {
            duration = duration || 3000;
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('hidden');
            t.style.opacity = '1';
            t.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(function(){
                t.style.opacity = '0';
                t.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(function(){ t.classList.add('hidden'); }, 300);
            }, duration);
        }

        /* ── NUMÉRO DE SEMAINE (basé sur le lundi) ── */
        function getWeekNumber() {
            var now = new Date();
            var startOfYear = new Date(now.getFullYear(), 0, 1);
            var day = now.getDay();
            var monday = new Date(now);
            monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
            monday.setHours(0, 0, 0, 0);
            var days = Math.floor((monday - startOfYear) / 86400000);
            return Math.floor(days / 7) + 1;
        }

        function getMissionForWeek(colocIndex, weekNum) {
            return missions[(colocIndex + weekNum) % missions.length];
        }

        /* ── RENDU CARTES ── */
        function renderTasks(users) {
            var week = getWeekNumber();
            var container = document.getElementById('tasks-container');
            container.innerHTML = '';

            colocs.forEach(function(nom, i) {
                var user = users.find(function(u){ return u.name === nom; });
                if (!user) return;

                var missionCourante = getMissionForWeek(i, week);
                var aUnRetard = user.tache_en_retard && !user.retard_valide;
                var retardRattrapé = user.tache_en_retard && user.retard_valide;

                if (aUnRetard) {
                    var missionRetard = getMissionForWeek(i, user.tache_en_retard);
                    container.innerHTML += '<div class="mission-card mission-retard p-3 lg:p-4 rounded-3xl border-2 flex justify-between items-center"><div class="leading-tight"><div class="flex items-center gap-2 mb-1"><p class="text-[8px] lg:text-[10px] font-black text-red-500 uppercase tracking-widest">' + nom + '</p><span class="bg-red-500 text-white text-[7px] font-black px-2 py-0.5 rounded-full">⚠️ RETARD S' + user.tache_en_retard + '</span></div><p class="font-bold text-xs lg:text-base text-red-700 dark:text-red-300">' + missionRetard + '</p><p class="text-[8px] text-red-400 font-bold mt-0.5">À faire en priorité</p></div><button onclick="validerRetard(\'' + nom + '\', this)" class="bg-red-500 text-white px-4 py-2 lg:px-6 lg:py-3 rounded-xl font-black text-[9px] lg:text-xs shadow-lg active:scale-95 transition-all">RATTRAPER</button></div>';
                    container.innerHTML += '<div class="mission-card mission-bloquee bg-slate-100 dark:bg-slate-800/30 p-3 lg:p-4 rounded-3xl border border-slate-200 dark:border-slate-700 flex justify-between items-center"><div class="leading-tight"><div class="flex items-center gap-2 mb-1"><p class="text-[8px] lg:text-[10px] font-black text-slate-400 uppercase tracking-widest">' + nom + '</p><span class="bg-slate-400 text-white text-[7px] font-black px-2 py-0.5 rounded-full">🔒 BLOQUÉ</span></div><p class="font-bold text-xs lg:text-base text-slate-400">' + missionCourante + '</p><p class="text-[8px] text-slate-400 font-bold mt-0.5">Disponible après le rattrapage</p></div><button disabled class="bg-slate-300 dark:bg-slate-700 text-slate-400 px-4 py-2 rounded-xl font-black text-[9px] cursor-not-allowed">🔒</button></div>';
                } else {
                    var dejàValidé = user.last_week_validated === week;
                    var rattrapéHtml = retardRattrapé ? '<p class="text-[8px] text-green-500 font-bold mt-0.5">✅ Retard S' + user.tache_en_retard + ' rattrapé !</p>' : '';
                    var btnClass = dejàValidé ? 'bg-green-500/20 text-green-500 px-4 py-2 rounded-xl text-[9px] font-bold' : 'bg-blue-600 text-white px-4 py-2 lg:px-6 lg:py-3 rounded-xl font-black text-[9px] lg:text-xs shadow-lg active:scale-95 transition-all';
                    container.innerHTML += '<div class="mission-card bg-slate-50 dark:bg-slate-800/40 p-3 lg:p-4 rounded-3xl border border-slate-200 dark:border-slate-700 flex justify-between items-center"><div class="leading-tight"><p class="text-[8px] lg:text-[10px] font-black text-blue-500 uppercase tracking-widest">' + nom + '</p><p class="font-bold text-xs lg:text-base dark:text-white">' + missionCourante + '</p>' + rattrapéHtml + '</div><button data-name="' + nom + '" onclick="addPoints(\'' + nom + '\', this)" class="' + btnClass + '" ' + (dejàValidé?'disabled':'') + '>' + (dejàValidé?'✅':'VALIDER') + '</button></div>';
                }
            });
        }

        /* ── VALIDER RETARD ── */
        function validerRetard(nom, btn) {
            dbGet('scores', '*').then(function(all) {
                var user = all.find(function(u){ return u.name === nom; });
                if (!user || user.retard_valide) return;
                dbUpdate('scores', { retard_valide: true }, ['id=eq.' + user.id]).then(function() {
                    dbInsert('logs', { name: nom, points_gagnes: 0, type: 'rattrapage' });
                    showToast('✅ ' + nom + ' — Rattrapage validé !');
                    fetchAllData();
                });
            });
        }

        /* ── FETCH DONNÉES ── */
        function fetchAllData() {
            var weekNum = getWeekNumber();
            dbGet('scores', '*', [], 'points.desc').then(function(users) {
                if (!users || users.length === 0) return;
                dbGet('logs', '*', [], 'created_at.desc', 10).then(function(logs) {

                    /* PODIUM */
                    document.getElementById('leaderboard').innerHTML = users.map(function(u, i){
                        var retardHtml = (u.tache_en_retard && !u.retard_valide) ? '<span class="text-red-500 text-[8px] ml-1">⚠️ retard</span>' : '';
                        return '<div class="flex justify-between items-center py-2 lg:py-3"><span class="text-xs lg:text-sm font-bold ' + (i===0?'text-blue-500':'opacity-80') + '">' + (i===0?'🥇':i+1) + '. ' + u.name + retardHtml + '</span><span class="font-black text-sm lg:text-xl">' + u.points + ' <small class="text-[8px] opacity-40">PTS</small></span></div>';
                    }).join('');

                    /* LIVE ACTIVITY */
                    var typeLabel = { validation:'✅ Validation', malus:'⚠️ Malus admin', malus_auto:'🤖 Malus auto', rattrapage:'🔄 Rattrapage' };
                    document.getElementById('history-logs').innerHTML = (logs || []).map(function(l){
                        var color = l.points_gagnes > 0 ? 'text-green-400' : l.points_gagnes < 0 ? 'text-red-400' : 'text-slate-400';
                        return '<div class="flex justify-between items-center border-b border-white/5 pb-2"><div class="flex flex-col"><span class="font-bold text-white">' + l.name + '</span><span class="opacity-40 text-[8px] uppercase font-black">' + (typeLabel[l.type]||l.type) + '</span></div><span class="' + color + ' font-black">' + (l.points_gagnes>0?'+':'') + l.points_gagnes + ' pts</span></div>';
                    }).join('');

                    /* ADMIN */
                    document.getElementById('admin-malus-list').innerHTML = users.map(function(u){
                        var retardHtml = (u.tache_en_retard && !u.retard_valide) ? '<p class="text-red-500 text-[9px]">⚠️ Retard S' + u.tache_en_retard + '</p>' : '';
                        return '<div class="flex justify-between items-center bg-slate-50 dark:bg-slate-700 p-3 rounded-2xl text-xs"><div class="text-left"><span class="font-bold">' + u.name + ' (' + u.points + ' pts)</span>' + retardHtml + '</div><button onclick="applyMalus(\'' + u.id + '\',\'' + u.name + '\',' + u.points + ')" class="bg-orange-600 text-white px-3 py-1 rounded-lg">-2 PTS</button></div>';
                    }).join('');

                    renderTasks(users);
                    renderChart(users);
                });
            });
        }

        /* ── GRAPHIQUE ── */
        function renderChart(users) {
            var ctx = document.getElementById('scoreChart').getContext('2d');
            var isDark = document.documentElement.classList.contains('dark');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: users.map(function(u){ return u.name; }), datasets: [{ data: users.map(function(u){ return u.points; }), backgroundColor: '#3b82f6', borderRadius: 6 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: {
                    y: { beginAtZero: true, grid: { color: isDark?'#1e293b':'#f1f5f9' }, ticks: { color: isDark?'#64748b':'#94a3b8', font: { size: 9 } } },
                    x: { grid: { display: false }, ticks: { color: isDark?'#64748b':'#94a3b8', font: { size: 9 } } }
                }}
            });
        }

        /* ── AJOUTER POINTS + NOTIFICATION VALIDATION ── */
        function addPoints(nom, btn) {
            var weekNum = getWeekNumber();
            dbGet('scores', '*').then(function(all) {
                var user = all.find(function(u){ return u.name === nom; });
                if (!user) return;
                if (user.last_week_validated === weekNum) return;
                if (user.tache_en_retard && !user.retard_valide) {
                    showToast('⛔ ' + nom + ' doit d\'abord rattraper sa tâche en retard !');
                    return;
                }
                var dejaCetteSemaine = all.filter(function(u){ return u.last_week_validated === weekNum; }).length;
                var pts = Math.max(1, 5 - dejaCetteSemaine);
                var updateData = { points: user.points + pts, last_week_validated: weekNum };
                if (user.retard_valide) { updateData.tache_en_retard = null; updateData.retard_valide = false; }

                dbUpdate('scores', updateData, ['id=eq.' + user.id]).then(function() {
                    dbInsert('logs', { name: nom, points_gagnes: pts, type: 'validation' });
                    showToast('✅ ' + nom + ' — +' + pts + ' point' + (pts>1?'s':'') + ' !');

                    /* Envoie notification aux autres colocs */
                    var colocIndex = colocs.indexOf(nom);
                    var mission = getMissionForWeek(colocIndex, weekNum);
                    sendNotifValidation(nom, mission);

                    fetchAllData();
                });
            });
        }

        /* ── ENVOI NOTIF VALIDATION VIA SERVICE WORKER ── */
        function sendNotifValidation(nom, mission) {
            if (!swReg) return;
            var sw = swReg.active;
            if (!sw) return;
            sw.postMessage({ type: 'VALIDATION_NOTIF', nom: nom, mission: mission });
        }

        /* ── MALUS MANUEL ── */
        function applyMalus(id, nom, current) {
            if (!confirm('Punir ' + nom + ' (-2 pts) ?')) return;
            var newPts = Math.max(0, current - 2);
            dbUpdate('scores', { points: newPts }, ['id=eq.' + id]).then(function() {
                dbInsert('logs', { name: nom, points_gagnes: -2, type: 'malus' });
                showToast('⚠️ Malus appliqué à ' + nom);
                fetchAllData();
            });
        }

        /* ── RESET ── */
        function resetAllScores() {
            if (!confirm('🚨 Pakito, confirmes-tu le Reset Total du mois ?')) return;
            dbUpdate('scores', { points: 0, last_week_validated: 0, tache_en_retard: null, retard_valide: false }, ['id=neq.0']).then(function() {
                dbDelete('logs', ['id=neq.0']);
                location.reload();
            });
        }

        /* ══════════════════════════════════════════════════════════
           FONCTIONS DE TEST ADMIN
        ══════════════════════════════════════════════════════════ */

        /* ── HELPER : récupère le SW actif ou attend qu'il soit prêt ── */
        function getSW() {
            return navigator.serviceWorker.ready.then(function(reg) {
                swReg = reg;
                return reg;
            });
        }

        /* Test alarme dimanche */
        function testAlarme() {
            if (Notification.permission !== 'granted') {
                requestNotificationPermission();
                return;
            }
            getSW().then(function(reg) {
                /* Envoie message au SW pour notification avec vibration */
                if (reg.active) {
                    reg.active.postMessage({ type: 'TEST_ALARM' });
                    showToast('🚨 Alarme test envoyée !');
                } else {
                    /* Fallback direct si SW pas encore actif */
                    reg.showNotification('🚨 TEST ALARME — Admin', {
                        body: 'Ceci est un test de l\'alarme du dimanche.',
                        icon: '/icon-192.png',
                        vibrate: [500,200,500,200,500,200,1000],
                        requireInteraction: true,
                        silent: false
                    });
                    showToast('🚨 Alarme test envoyée !');
                }
            }).catch(function() { showToast('❌ Active les notifications d\'abord !'); });
        }

        /* Test notification validation */
        function testValidation() {
            if (Notification.permission !== 'granted') {
                requestNotificationPermission();
                return;
            }
            var weekNum = getWeekNumber();
            var mission = getMissionForWeek(colocs.indexOf('PAKITO'), weekNum);
            getSW().then(function(reg) {
                if (reg.active) {
                    reg.active.postMessage({ type: 'TEST_VALIDATION', nom: 'PAKITO', mission: mission });
                } else {
                    reg.showNotification('✅ PAKITO a validé sa tâche !', {
                        body: mission + ' — C\'est fait cette semaine 💪',
                        icon: '/icon-192.png',
                        vibrate: [100,50,100],
                        silent: false
                    });
                }
                showToast('✅ Notif validation test envoyée !');
            }).catch(function() { showToast('❌ Active les notifications d\'abord !'); });
        }

        /* Test rappel non-validés */
        function testRappel() {
            if (Notification.permission !== 'granted') {
                requestNotificationPermission();
                return;
            }
            var weekNum = getWeekNumber();
            dbGet('scores', 'name,last_week_validated').then(function(users) {
                var nonValides = (users || []).filter(function(u){ return u.last_week_validated !== weekNum; }).map(function(u){ return u.name; });
                getSW().then(function(reg) {
                    reg.showNotification(
                        nonValides.length === 0 ? '✅ Tout le monde a validé !' : '🔔 Rappel — Missions en attente',
                        {
                            body: nonValides.length === 0 ? 'Bravo l\'équipe ! 🎉' : nonValides.join(', ') + ' n\'ont pas encore validé.',
                            icon: '/icon-192.png',
                            vibrate: [200,100,200],
                            silent: false
                        }
                    );
                    showToast('🔔 Rappel test envoyé !');
                }).catch(function() { showToast('❌ Active les notifications d\'abord !'); });
            });
        }

        /* ── SERVICE WORKER ── */
        function initServiceWorker() {
            if (!('serviceWorker' in navigator)) return;
            navigator.serviceWorker.register('/sw.js').then(function(reg) {
                swReg = reg;
                var sw = reg.active || reg.installing || reg.waiting;
                if (sw) sw.postMessage({ type: 'SCHEDULE_CHECKS' });
                updateNotifStatusUI();
            }).catch(function(err) { console.error('[SW]', err); });
        }

        function requestNotificationPermission() {
            if (!('Notification' in window)) { showToast('❌ Notifications non supportées'); return; }
            Notification.requestPermission().then(function(permission) {
                if (permission === 'granted') {
                    dismissBanner();
                    updateNotifStatusUI();
                    showToast('🔔 Notifications activées !');
                    initServiceWorker();
                } else {
                    showToast('❌ Notifications refusées');
                }
            });
        }

        function updateNotifStatusUI() {
            if (!('Notification' in window)) return;
            var icon = document.getElementById('notif-status');
            icon.classList.remove('hidden');
            icon.textContent = Notification.permission === 'granted' ? '🔔' : '🔕';
            icon.title = Notification.permission === 'granted' ? 'Notifications actives' : 'Cliquer pour activer';
        }

        function showNotifInfo() {
            if (Notification.permission === 'granted') showToast('🔔 Actives — dim. 15h / 20h / 23h30 + malus 23h59 + validations');
            else requestNotificationPermission();
        }

        function dismissBanner() {
            var b = document.getElementById('notif-banner');
            b.style.opacity = '0'; b.style.transform = 'translateY(-100%)';
            setTimeout(function(){ b.classList.add('hidden'); }, 300);
            localStorage.setItem('notif-banner-dismissed', '1');
        }

        function checkShowBanner() {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') return;
            if (localStorage.getItem('notif-banner-dismissed')) return;
            setTimeout(function(){ document.getElementById('notif-banner').classList.remove('hidden'); }, 1500);
        }

        /* ── MODE SOMBRE ── */
        function toggleDarkMode() {
            var html = document.documentElement;
            var icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) { html.classList.remove('dark'); localStorage.setItem('theme','light'); icon.innerText = "🌞"; }
            else { html.classList.add('dark'); localStorage.setItem('theme','dark'); icon.innerText = "🌙"; }
            if (myChart) renderChart([]);
        }

        /* ── ADMIN 5 CLICS ── */
        var adminClicks = 0;
        document.getElementById('admin-trigger').onclick = function() {
            if (++adminClicks === 5) { document.getElementById('admin-panel').classList.remove('hidden'); adminClicks = 0; }
        };

        /* ── INIT ── */
        function init() {
            if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); document.getElementById('theme-icon').innerText = "🌙"; }
            document.getElementById('week-info').innerText = 'Semaine n°' + getWeekNumber();
            initServiceWorker();
            updateNotifStatusUI();
            checkShowBanner();
            fetchAllData();
        }

        init();
    </script>
</body>
</html>
