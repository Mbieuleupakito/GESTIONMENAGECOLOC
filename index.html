<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Team App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 pb-10 font-sans">

    <header class="bg-blue-700 text-white p-6 shadow-lg mb-6 rounded-b-[2.5rem] text-center">
        <h1 class="text-2xl font-black italic tracking-tighter">🚀 CLEAN TEAM</h1>
        <p id="week-info" class="text-blue-200 text-xs mt-1 font-bold uppercase tracking-widest italic">Chargement...</p>
    </header>

    <main class="max-w-md mx-auto px-4">
        <div id="weekend-alert" class="hidden mb-6 bg-orange-100 border-l-4 border-orange-500 p-4 rounded-r-xl shadow-sm">
            <p class="text-orange-700 font-bold text-sm">⚠️ C'est le week-end !</p>
            <p class="text-orange-600 text-xs text-pretty italic">N'oubliez pas de valider vos tâches avant lundi ou utilisez le bouton 💬 pour relancer les retardataires.</p>
        </div>

        <h2 class="font-bold text-slate-800 mb-4 flex items-center text-sm uppercase tracking-wide">
            <span class="mr-2">📅</span> Missions de la semaine
        </h2>
        <div id="tasks-container" class="space-y-3"></div>

        <h2 class="font-bold text-slate-800 mt-10 mb-4 flex items-center text-sm uppercase tracking-wide">
            <span class="mr-2">🏆</span> Classement des Pros
        </h2>
        <div id="leaderboard" class="bg-white rounded-3xl p-4 shadow-md border border-slate-200">
            <p class="text-center text-slate-400 py-4 text-sm italic">Mise à jour...</p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const colocs = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        const missions = ["🚿 Douche Gauche", "🚽 WC Droit", "🧻 WC Gauche", "🧹 Couloir + Cuisine", "🚿 Douche Droite"];

        function getWeekNumber() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            return Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        }

        // Fonction pour envoyer le message WhatsApp
        function sendReminder(nom, mission) {
            const message = `Salut ${nom} ! Petit rappel de la CLEAN TEAM 🚀 : N'oublie pas d'effectuer ta tâche (${mission}) avant demain soir ! 🙏🧹`;
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/?text=${encodedMessage}`, '_blank');
        }

        async function fetchScores() {
            const { data } = await _supabase.from('scores').select('*').order('points', { ascending: false });
            if (data) {
                document.getElementById('leaderboard').innerHTML = data.map((u, i) => `
                    <div class="flex justify-between items-center py-3 ${i < data.length -1 ? 'border-b border-slate-50' : ''}">
                        <span class="font-bold text-slate-700">${i+1}. ${u.name}</span>
                        <span class="bg-blue-50 text-blue-700 font-bold px-3 py-1 rounded-full text-xs">${u.points} pts</span>
                    </div>`).join('');
            }
        }

        async function addPoints(nom, btn) {
            btn.disabled = true;
            btn.innerHTML = "⏳";
            try {
                let { data } = await _supabase.from('scores').select('id, points').eq('name', nom);
                if (!data || data.length === 0) throw new Error("Coloc non trouvé");
                const user = data[0];
                const { error: e2 } = await _supabase.from('scores').update({ points: user.points + 10 }).eq('id', user.id);
                if (e2) throw e2;
                await fetchScores();
                btn.innerHTML = "✅";
                btn.className = "bg-green-100 text-green-600 px-5 py-2 rounded-xl text-xs font-bold";
                // Cacher le bouton WhatsApp une fois validé
                const waBtn = btn.parentElement.querySelector('.wa-btn');
                if(waBtn) waBtn.classList.add('hidden');
            } catch (err) {
                alert("Erreur: " + err.message);
                btn.disabled = false;
                btn.innerHTML = "Valider";
            }
        }

        function init() {
            const now = new Date();
            const day = now.getDay(); // 0 = Dimanche, 6 = Samedi
            const week = getWeekNumber();
            
            // Affichage de l'alerte Samedi (6) ou Dimanche (0)
            if (day === 0 || day === 6) {
                document.getElementById('weekend-alert').classList.remove('hidden');
            }

            document.getElementById('week-info').innerText = "Semaine n°" + week;
            
            document.getElementById('tasks-container').innerHTML = colocs.map((nom, i) => {
                const mIndex = (i + week) % missions.length;
                const mission = missions[mIndex];
                return `
                <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-200 flex justify-between items-center mb-3">
                    <div>
                        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">${nom}</p>
                        <p class="font-bold text-slate-800">${mission}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="sendReminder('${nom}', '${mission}')" class="wa-btn p-2 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 transition-colors">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        </button>
                        <button onclick="addPoints('${nom}', this)" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-sm">
                            Valider
                        </button>
                    </div>
                </div>`;
            }).join('');
            fetchScores();
        }

        init();
    </script>
</body>
</html>
