<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Team Elite | Dashboard Pro</title>
    <meta name="author" content="Honoré Mbieleu Pakito">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Scrollbar fine pour PC */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        @media (min-width: 1024px) {
            .pc-height { height: calc(100vh - 80px); } /* Hauteur fixe sous le header */
            body { overflow: hidden; } /* Désactive le scroll global sur PC */
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans h-full transition-colors duration-300" id="app-body">

    <header class="fixed top-0 left-0 right-0 bg-blue-700 text-white p-3 lg:p-4 shadow-xl z-50 flex justify-between items-center h-[60px] lg:h-[70px]">
        <div class="flex flex-col items-start leading-tight">
            <h1 id="admin-trigger" class="text-lg lg:text-2xl font-black italic tracking-tighter cursor-pointer">🚀 CLEAN TEAM ELITE</h1>
            <p id="week-info" class="text-[9px] lg:text-xs font-bold uppercase opacity-80">Semaine --</p>
        </div>
        <button onclick="toggleDarkMode()" class="text-xl p-2 bg-white/10 rounded-full hover:bg-white/20 transition-all">🌓</button>
    </header>

    <div class="h-[60px] lg:h-[70px]"></div>

    <main class="max-w-[1600px] mx-auto p-3 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-6 pc-height overflow-y-auto lg:overflow-hidden">
        
        <div class="lg:col-span-7 flex flex-col gap-4 h-full">
            <div class="bg-white dark:bg-slate-900 p-4 lg:p-5 rounded-[2rem] shadow-xl border border-slate-200 dark:border-slate-800 flex flex-col h-full overflow-hidden">
                <h2 class="font-black text-blue-600 dark:text-blue-400 mb-3 flex items-center text-sm lg:text-xl uppercase italic">
                    <span class="mr-2">🧹</span> Missions Hebdo
                </h2>
                <div id="tasks-container" class="space-y-2 lg:space-y-2 overflow-y-auto pr-1 flex-grow">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-4 h-full overflow-hidden">
            <div class="bg-white dark:bg-slate-900 p-3 rounded-[2rem] shadow-md border border-slate-200 dark:border-slate-800 h-[180px] lg:h-[200px] shrink-0">
                <canvas id="scoreChart"></canvas>
            </div>

            <div class="bg-white dark:bg-slate-900 p-4 rounded-[2rem] shadow-xl border border-slate-200 dark:border-slate-800 flex-grow overflow-hidden flex flex-col">
                <h3 class="font-bold text-[10px] lg:text-xs uppercase tracking-widest mb-3 opacity-60 flex items-center">👑 Podium</h3>
                <div id="leaderboard" class="divide-y divide-slate-100 dark:divide-slate-800 overflow-y-auto pr-1">
                    </div>
            </div>

            <div class="bg-slate-900 text-slate-300 p-4 rounded-[2rem] h-[120px] lg:h-[150px] shrink-0 flex flex-col shadow-2xl">
                <p class="text-[8px] font-black text-blue-400 uppercase mb-2 tracking-widest italic italic">Live Activity</p>
                <div id="history-logs" class="overflow-y-auto space-y-1 text-[9px] lg:text-[10px]">
                    </div>
            </div>
        </div>
    </main>

    <div id="admin-panel" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md p-8 rounded-[3rem] shadow-2xl text-center">
            <h3 class="text-red-600 font-black mb-6 uppercase tracking-tighter">PAKITO ADMIN MODE</h3>
            <div id="admin-malus-list" class="space-y-2 mb-6 max-h-[300px] overflow-y-auto"></div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="bg-slate-200 dark:bg-slate-700 py-3 rounded-xl font-bold">Fermer</button>
                <button onclick="resetAllScores()" class="bg-red-600 text-white py-3 rounded-xl font-bold">RESET GLOBAL</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://avpxzwjxmytdcmlxtixh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CoTpQtG8306po9DCFDRyrg_4-nC16vM'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const colocs = ["CHIESA", "ISSA", "PAKITO", "GEOFFROY", "ISMAEL"];
        const missions = ["🚿 Douche Gauche", "🚽 WC Droit", "🧻 WC Gauche", "🧹 Cuisine + Salon", "🚿 Douche Droite"];
        let myChart;

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            if(myChart) renderChart([]); 
        }

        function getWeekNumber() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            return Math.ceil((((now - start) / 86400000) + start.getDay() + 1) / 7);
        }

        async function fetchAllData() {
            const weekNum = getWeekNumber();
            const { data: users } = await _supabase.from('scores').select('*').order('points', { ascending: false });
            const { data: logs } = await _supabase.from('logs').select('*').order('created_at', { descending: true }).limit(8);

            if (!users) return;

            // 1. Leaderboard
            document.getElementById('leaderboard').innerHTML = users.map((u, i) => `
                <div class="flex justify-between items-center py-2 lg:py-3 border-b border-slate-50/5">
                    <span class="text-xs lg:text-sm font-bold ${i==0?'text-blue-500':'opacity-80'}">${i==0?'🥇':i+1}. ${u.name}</span>
                    <span class="font-black text-sm lg:text-lg">${u.points} <small class="text-[8px] opacity-40">PTS</small></span>
                </div>`).join('');

            // 2. Logs
            document.getElementById('history-logs').innerHTML = logs.map(l => `
                <div class="flex justify-between items-center opacity-70">
                    <span>${l.name}</span>
                    <span class="${l.points_gagnes>0?'text-green-400':'text-red-400'} font-bold">${l.points_gagnes>0?'+':''}${l.points_gagnes}</span>
                </div>`).join('');

            // 3. Boutons État
            users.forEach(u => {
                const btn = document.querySelector(`button[data-name="${u.name}"]`);
                if (btn && u.last_week_validated === weekNum) {
                    btn.disabled = true; btn.innerHTML = "✅";
                    btn.className = "bg-green-500/20 text-green-500 px-3 py-1 lg:px-4 lg:py-2 rounded-xl text-[9px] font-bold";
                }
            });

            // 4. Admin
            document.getElementById('admin-malus-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-slate-100 dark:bg-slate-800 p-3 rounded-xl mb-1 text-xs">
                    <span>${u.name}</span>
                    <button onclick="applyMalus('${u.id}', '${u.name}', ${u.points})" class="bg-orange-600 text-white px-3 py-1 rounded-lg">-2</button>
                </div>`).join('');

            renderChart(users);
        }

        function renderChart(users) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: users.map(u => u.name),
                    datasets: [{ data: users.map(u => u.points), backgroundColor: '#3b82f6', borderRadius: 4 }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: isDark ? '#1e293b':'#e2e8f0' }, ticks: { color: isDark?'#64748b':'#94a3b8', font: {size: 8} } },
                        x: { grid: { display: false }, ticks: { color: isDark?'#64748b':'#94a3b8', font: {size: 8} } }
                    }
                }
            });
        }

        async function addPoints(nom, btn) {
            const weekNum = getWeekNumber();
            try {
                let { data: all } = await _supabase.from('scores').select('*');
                const user = all.find(u => u.name === nom);
                if (user.last_week_validated === weekNum) return;
                const pts = Math.max(1, 5 - all.filter(u => u.last_week_validated === weekNum).length);
                await _supabase.from('scores').update({ points: user.points + pts, last_week_validated: weekNum }).eq('id', user.id);
                await _supabase.from('logs').insert([{ name: nom, points_gagnes: pts, type: 'validation' }]);
                fetchAllData();
            } catch (e) { console.error(e); }
        }

        async function applyMalus(id, nom, current) {
            await _supabase.from('scores').update({ points: current - 2 }).eq('id', id);
            await _supabase.from('logs').insert([{ name: nom, points_gagnes: -2, type: 'malus' }]);
            fetchAllData();
        }

        async function resetAllScores() {
            if (!confirm("🚨 Confirmer Reset Global ?")) return;
            await _supabase.from('scores').update({ points: 0, last_week_validated: 0 }).neq('id', 0);
            await _supabase.from('logs').delete().neq('id', 0);
            location.reload();
        }

        let adminClicks = 0;
        document.getElementById('admin-trigger').onclick = () => { if(++adminClicks === 5) { document.getElementById('admin-panel').classList.remove('hidden'); adminClicks=0; }};

        function init() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            const week = getWeekNumber();
            document.getElementById('week-info').innerText = "Semaine n°" + week;
            document.getElementById('tasks-container').innerHTML = colocs.map((nom, i) => {
                const mission = missions[(i + week) % missions.length];
                return `
                <div class="bg-slate-50 dark:bg-slate-800/40 p-3 lg:p-4 rounded-2xl border border-slate-200 dark:border-slate-700 flex justify-between items-center transition-transform hover:scale-[1.01]">
                    <div class="leading-tight">
                        <p class="text-[7px] lg:text-[9px] font-black text-blue-500 uppercase">${nom}</p>
                        <p class="font-bold text-xs lg:text-lg dark:text-white">${mission}</p>
                    </div>
                    <button data-name="${nom}" onclick="addPoints('${nom}', this)" class="bg-blue-600 text-white px-3 py-1.5 lg:px-6 lg:py-3 rounded-xl font-black text-[9px] lg:text-xs shadow-md active:scale-95 transition-all">VALIDER</button>
                </div>`;
            }).join('');
            fetchAllData();
        }
        init();
    </script>
</body>
</html>
