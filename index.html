<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Team Elite V2 | Pakito Edition</title>
    
    <meta name="author" content="Honoré Mbieleu Pakito">
    <meta name="copyright" content="© 2026 Honoré Mbieleu Pakito">

    <script src="https://cdn.tailwindcss.com"></script> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
        /* CONFIGURATION DU MODE SOMBRE */
        .dark { background-color: #0f172a; color: white; }
        .dark .bg-white { background-color: #1e293b; color: white; border-color: #334155; }
        .dark .text-slate-800 { color: #f1f5f9; }
        .dark .text-slate-700 { color: #cbd5e1; }
        .dark .border-slate-200 { border-color: #334155; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 pb-10 font-sans transition-all" id="body">

    <header class="bg-blue-700 text-white p-6 shadow-lg mb-6 rounded-b-[2.5rem] text-center relative overflow-hidden">
        <button onclick="toggleDarkMode()" class="absolute right-6 top-6 text-xl p-2 bg-blue-600 rounded-full shadow-inner active:scale-90 transition-all">🌓</button>
        <h1 id="admin-trigger" class="text-2xl font-black italic tracking-tighter cursor-pointer select-none relative z-10">🚀 NETTOYAGE APPART 48</h1>
        <p id="week-info" class="text-blue-200 text-xs mt-1 font-bold uppercase tracking-widest italic relative z-10">Chargement...</p>
    </header>

    <main class="max-w-md mx-auto px-4 min-h-screen">
        
        <div class="bg-white p-5 rounded-3xl shadow-md mb-6 border border-slate-200">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Performances Live</h3>
            <canvas id="scoreChart" height="160"></canvas>
        </div>

        <div id="weekend-alert" class="hidden mb-6 bg-orange-100 border-l-4 border-orange-500 p-4 rounded-r-xl animate-pulse">
            <p class="text-orange-700 font-bold text-sm flex items-center">
                <span class="mr-2">⚠️</span> COURSE CONTRE LA MONTRE
            </p>
            <p class="text-orange-600 text-[10px] italic">Validez vite pour maximiser vos points !</p>
        </div>

        <div id="tasks-container" class="space-y-3"></div>

        <h2 class="font-bold text-slate-800 mt-10 mb-4 flex items-center text-sm uppercase tracking-wide">
            <span class="mr-2">🏆</span> Classement & Activité
        </h2>
        <div id="leaderboard" class="bg-white rounded-3xl p-4 shadow-md border border-slate-200 divide-y divide-slate-50"></div>

        <div class="mt-8 p-4 bg-slate-200/50 dark:bg-slate-800/50 rounded-2xl">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-tighter">Flux d'activité récent</h3>
            <div id="history-logs" class="text-[10px] space-y-2"></div>
        </div>

        <div id="admin-panel" class="hidden mt-10 p-6 bg-red-900/10 rounded-[2.5rem] border-2 border-dashed border-red-300">
            <h3 class="text-red-700 font-black text-xs mb-4 text-center uppercase tracking-widest">👑 CONTRÔLE GÉRANT</h3>
            <div id="admin-malus-list" class="space-y-2 mb-6 text-slate-800"></div>
            <button onclick="resetAllScores()" class="w-full bg-red-600 text-white py-4 rounded-2xl text-xs font-black uppercase shadow-xl active:scale-95 transition-all">
                🚨 Réinitialiser le mois
            </button>
        </div>

        <footer class="mt-12 mb-6 text-center border-t border-slate-200 pt-6">
            <p class="text-slate-400 text-[10px] font-medium tracking-widest uppercase">
                © 2026 Honoré Mbieleu Pakito
            </p>
            <p class="text-slate-300 text-[9px] mt-1">
                Tous droits réservés. Design & Code par Pakito.
            </p>
        </footer>
    </main>

    <script>
        /* --- FONCTION : CHARGER TOUTES LES DONNÉES --- */
        async function fetchAllData() {
            const weekNum = getWeekNumber();
            
            // On récupère les scores et les logs
            const { data: users, error: uErr } = await _supabase.from('scores').select('*').order('points', { ascending: false });
            const { data: logs, error: lErr } = await _supabase.from('logs').select('*').order('created_at', { descending: true }).limit(8);

            if (uErr || lErr) return;

            // 1. MISE À JOUR DU CLASSEMENT (Affichage clair des points cumulés)
            document.getElementById('leaderboard').innerHTML = users.map((u, i) => `
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center">
                        <span class="text-xs font-bold mr-3 ${i==0 ? 'text-yellow-500' : 'text-slate-300'}">${i==0 ? '👑' : i+1}</span>
                        <span class="font-bold text-lg ${i==0 ? 'text-blue-600 dark:text-blue-400' : 'text-slate-700 dark:text-slate-300'}">${u.name}</span>
                    </div>
                    <div class="text-right">
                        <span class="font-black text-xl text-slate-800 dark:text-white">${u.points}</span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase ml-1">pts</span>
                    </div>
                </div>`).join('');

            // 2. MISE À JOUR DE L'HISTORIQUE (Détail des points gagnés/perdus)
            document.getElementById('history-logs').innerHTML = logs.map(l => {
                const isMalus = l.type === 'malus';
                const colorClass = isMalus ? 'text-red-500' : 'text-green-500';
                const prefix = l.points_gagnes > 0 ? '+' : '';
                return `
                <div class="flex justify-between items-center border-b border-slate-300/20 pb-2 mb-1">
                    <div class="flex flex-col">
                        <span class="font-bold text-slate-700 dark:text-slate-200">${l.name}</span>
                        <span class="opacity-50 text-[9px] uppercase">${l.type}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-black ${colorClass}">${prefix}${l.points_gagnes} pts</span>
                        <span class="opacity-40 text-[9px]">${new Date(l.created_at).toLocaleTimeString([], {hour: '2h', minute:'2h'})}</span>
                    </div>
                </div>`;
            }).join('');

            // Gestion des boutons de validation
            users.forEach(u => {
                const btn = document.querySelector(`button[data-name="${u.name}"]`);
                if (btn && u.last_week_validated === weekNum) {
                    btn.disabled = true;
                    btn.innerHTML = "✅ Validé";
                    btn.className = "bg-green-100 text-green-600 px-5 py-2 rounded-xl text-xs font-bold opacity-80";
                }
            });

            // Liste des malus dans le panneau Admin
            document.getElementById('admin-malus-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-white dark:bg-slate-700 p-3 rounded-xl shadow-sm mb-2">
                    <span class="text-xs font-bold">${u.name} (${u.points} pts)</span>
                    <button onclick="applyMalus('${u.id}', '${u.name}', ${u.points})" class="bg-orange-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold">-2 PTS</button>
                </div>`).join('');

            updateChart(users);
        }
    </script>
</body>
</html>
